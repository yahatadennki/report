<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひまわりスタッフ 日報</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
  h2 { text-align: center; font-size: 20px; }
  .sub { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
  .form { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }
  input[type="date"], input[type="number"], textarea {
    display: block; width: 100%; padding: 6px 8px; font-size: 14px;
    border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px;
  }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

  /* 共通ボタン */
  .tag {
    padding: 5px 12px; border-radius: 20px; border: 2px solid #ccc;
    background: #fff; color: #333; cursor: pointer; font-size: 12px;
    font-weight: bold; transition: all 0.15s;
  }

  /* 担当者カラー（受注日報と同じ） */
  .tag.ishibashi         { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
  .tag.ishibashi.on      { background: #fca5a5; color: #7f1d1d; border-color: #ef4444; box-shadow: 0 0 0 2px #ef4444; }
  .tag.kakui             { background: #fef9c3; color: #854d0e; border-color: #fef08a; }
  .tag.kakui.on          { background: #fde047; color: #713f12; border-color: #ca8a04; box-shadow: 0 0 0 2px #ca8a04; }
  .tag.sakurai           { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
  .tag.sakurai.on        { background: #d8b4fe; color: #4c1d95; border-color: #9333ea; box-shadow: 0 0 0 2px #9333ea; }

  /* 区域カラー（担当者に対応） */
  /* 角井担当：1・3区 → 黄色 */
  .tag.area-kakui        { background: #fef9c3; color: #854d0e; border-color: #fef08a; }
  .tag.area-kakui.on     { background: #fde047; color: #713f12; border-color: #ca8a04; box-shadow: 0 0 0 2px #ca8a04; }
  /* 櫻井担当：2・7・8・9区 → 紫 */
  .tag.area-sakurai      { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
  .tag.area-sakurai.on   { background: #d8b4fe; color: #4c1d95; border-color: #9333ea; box-shadow: 0 0 0 2px #9333ea; }
  /* 石橋担当：4・5・6区 → 赤 */
  .tag.area-ishibashi    { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
  .tag.area-ishibashi.on { background: #fca5a5; color: #7f1d1d; border-color: #ef4444; box-shadow: 0 0 0 2px #ef4444; }

  /* 配布物ボタン */
  .tag.item        { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
  .tag.item.on     { background: #fb923c; color: #fff; border-color: #ea580c; box-shadow: 0 0 0 2px #ea580c; }

  .btn {
    display: block; width: 100%; padding: 10px; font-size: 15px; font-weight: bold;
    background: #4CAF50; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 16px;
  }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .msg { text-align: center; margin-top: 10px; font-weight: bold; font-size: 14px; }
  .msg.ok { color: #4CAF50; }
  .msg.err { color: #e53935; }
  .log { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
  .log-header { display: flex; justify-content: space-between; align-items: center; }
  .del { background: none; border: none; color: #e53935; cursor: pointer; font-size: 13px; }
  textarea { resize: vertical; }
</style>
</head>
<body>
<!-- PIN認証オーバーレイ -->
<div id="pinOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a3c5e,#2d6a9f);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:20px;padding:40px 32px;width:90%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <div style="font-size:48px;margin-bottom:8px;">🌻</div>
    <div style="font-size:18px;font-weight:bold;color:#1a3c5e;margin-bottom:4px;">㈲ヤハタ電機商会</div>
    <div style="font-size:13px;color:#888;margin-bottom:28px;">ひまわりスタッフ日報</div>
    <div style="font-size:13px;font-weight:bold;color:#555;margin-bottom:10px;">PINコードを入力してください</div>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off"
      style="width:100%;padding:14px;font-size:28px;letter-spacing:12px;text-align:center;border:2px solid #ddd;border-radius:12px;outline:none;margin-bottom:16px;"
      placeholder="● ● ● ●"
      onfocus="this.style.borderColor='#f97316'"
      onblur="this.style.borderColor='#ddd'"
      onkeydown="if(event.key==='Enter')verifyPin()">
    <div id="pinError" style="color:#dc2626;font-size:13px;margin-bottom:12px;min-height:18px;"></div>
    <button onclick="verifyPin()" style="width:100%;padding:14px;background:#f97316;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;">ログイン</button>
  </div>
</div>
<script>
(function(){
  const PIN_HASH = 'aa4b0d224e2b4488c6e3c5692347a0e26322d86dcb6bf01ab937e15d76037ee4';
  const AUTH_KEY = 'himawari_auth';
  const AUTH_DAYS = 30;
  async function hashPin(pin){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  window.verifyPin = async function(){
    const pin = document.getElementById('pinInput').value;
    if(pin.length!==4){document.getElementById('pinError').textContent='4桁のPINを入力してください';return;}
    const h = await hashPin(pin);
    if(h===PIN_HASH){
      localStorage.setItem(AUTH_KEY, Date.now()+AUTH_DAYS*86400000);
      document.getElementById('pinOverlay').style.display='none';
    }else{
      document.getElementById('pinError').textContent='❌ PINが違います';
      document.getElementById('pinInput').value='';
      document.getElementById('pinInput').focus();
    }
  };
  const stored = localStorage.getItem(AUTH_KEY);
  if(stored && Date.now()<parseInt(stored)){
    document.getElementById('pinOverlay').style.display='none';
  }
})();
</script>
  <h2>🌻 ひまわりスタッフ 日報</h2>
  <p class="sub">㈲ヤハタ電機商会</p>

  <div class="form">
    <label>日にち</label>
    <input type="date" id="date">

    <label>担当者（1人だけ選択してください）</label>
    <div class="tags" id="staffTags"></div>

    <label>区域</label>
    <div class="tags" id="areaTags"></div>

    <div class="row">
      <div>
        <label>面談件数</label>
        <input type="number" id="visits" min="0" placeholder="0">
      </div>
      <div>
        <label>TEL件数</label>
        <input type="number" id="tels" min="0" placeholder="0">
      </div>
      <div>
        <label>ポスティング件数</label>
        <input type="number" id="postings" min="0" placeholder="0">
      </div>
    </div>

    <label>配布物</label>
    <div class="tags" id="itemTags"></div>

    <label>備考</label>
    <input type="text" id="remarks" placeholder="お客様からの要望など">

    <button class="btn" id="submitBtn">送信</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="logs"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxrFUzdm4ZVBLa2JApaVBmHD7J-UNW9CiCltjeSVEeq6Bpi0rkLCHfOgqJiYTvuiP2v/exec";

// 担当者と対応するCSSクラス
const STAFF = [
  { name: "石橋", cls: "ishibashi" },
  { name: "角井", cls: "kakui" },
  { name: "櫻井", cls: "sakurai" },
  { name: "北沢", cls: "kitazawa" }
];

// 区域と担当者対応
const AREAS = [
  { name: "1区", cls: "area-kakui" },
  { name: "2区", cls: "area-sakurai" },
  { name: "3区", cls: "area-kakui" },
  { name: "4区", cls: "area-ishibashi" },
  { name: "5区", cls: "area-ishibashi" },
  { name: "6区", cls: "area-ishibashi" },
  { name: "7区", cls: "area-sakurai" },
  { name: "8区", cls: "area-sakurai" },
  { name: "9区", cls: "area-sakurai" }
];

const ITEMS = ["消耗品","ハガキ","チラシ","招待状","カレンダー","年賀タオル"];

let selected = { staff: "", areas: [], items: [] };
let logs = [];

// 担当者タグ生成
function createStaffTags() {
  const container = document.getElementById("staffTags");
  STAFF.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "tag " + s.cls;
    btn.textContent = s.name;
    btn.onclick = () => {
      document.querySelectorAll("#staffTags .tag").forEach(t => {
        const base = STAFF.find(x => x.name === t.textContent);
        t.className = "tag " + (base ? base.cls : "");
      });
      btn.classList.add("on");
      selected.staff = s.name;
    };
    container.appendChild(btn);
  });
}

// 区域タグ生成
function createAreaTags() {
  const container = document.getElementById("areaTags");
  AREAS.forEach(a => {
    const btn = document.createElement("button");
    btn.className = "tag " + a.cls;
    btn.textContent = a.name;
    btn.onclick = () => {
      const idx = selected.areas.indexOf(a.name);
      if (idx > -1) {
        selected.areas.splice(idx, 1);
        btn.className = "tag " + a.cls;
      } else {
        selected.areas.push(a.name);
        btn.classList.add("on");
      }
    };
    container.appendChild(btn);
  });
}

// 配布物タグ生成
function createItemTags() {
  const container = document.getElementById("itemTags");
  ITEMS.forEach(val => {
    const btn = document.createElement("button");
    btn.className = "tag item";
    btn.textContent = val;
    btn.onclick = () => {
      const idx = selected.items.indexOf(val);
      if (idx > -1) {
        selected.items.splice(idx, 1);
        btn.className = "tag item";
      } else {
        selected.items.push(val);
        btn.classList.add("on");
      }
    };
    container.appendChild(btn);
  });
}

createStaffTags();
createAreaTags();
createItemTags();

const today = new Date();
document.getElementById("date").value = today.toISOString().split("T")[0];

document.getElementById("submitBtn").addEventListener("click", async () => {
  const date = document.getElementById("date").value;
  if (!date || !selected.staff) {
    alert("日にちと担当者は必須です");
    return;
  }

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");
  btn.disabled = true;
  btn.textContent = "送信中...";
  msg.textContent = "";

  const entry = {
    date,
    staff: selected.staff,
    areas: selected.areas.join("・"),
    visits: document.getElementById("visits").value || "0",
    tels: document.getElementById("tels").value || "0",
    postings: document.getElementById("postings").value || "0",
    items: selected.items.join("・"),
    remarks: document.getElementById("remarks").value
  };

  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entry)
    });
    msg.className = "msg ok";
    msg.textContent = "✅ " + selected.staff + "のシートに送信しました！";
    logs.push(entry);
    renderLogs();
    // リセット
    document.getElementById("date").value = today.toISOString().split("T")[0];
    document.getElementById("visits").value = "";
    document.getElementById("tels").value = "";
    document.getElementById("postings").value = "";
    document.getElementById("remarks").value = "";
    selected = { staff: "", areas: [], items: [] };
    document.querySelectorAll("#staffTags .tag").forEach(t => {
      const base = STAFF.find(x => x.name === t.textContent);
      t.className = "tag " + (base ? base.cls : "");
    });
    document.querySelectorAll("#areaTags .tag").forEach(t => {
      const base = AREAS.find(x => x.name === t.textContent);
      t.className = "tag " + (base ? base.cls : "");
    });
    document.querySelectorAll("#itemTags .tag").forEach(t => { t.className = "tag item"; });
  } catch (e) {
    msg.className = "msg err";
    msg.textContent = "❌ 送信に失敗しました。再度お試しください。";
  }
  btn.disabled = false;
  btn.textContent = "送信";
  setTimeout(() => { msg.textContent = ""; }, 3000);
});

function renderLogs() {
  const container = document.getElementById("logs");
  if (logs.length > 0) {
    container.innerHTML = '<h3 style="font-size:14px;margin-bottom:8px">本日の送信済み一覧</h3>';
  } else { container.innerHTML = ""; return; }
  logs.forEach((log, i) => {
    container.innerHTML += `
      <div class="log">
        <div class="log-header"><strong>${log.date}</strong><button class="del" onclick="deleteLog(${i})">削除</button></div>
        <div>担当者: ${log.staff || "ー"}</div>
        <div>区域: ${log.areas || "ー"}</div>
        <div>面談: ${log.visits} / TEL: ${log.tels} / ポスティング: ${log.postings}</div>
        <div>配布物: ${log.items || "ー"}</div>
        ${log.remarks ? "<div>備考: " + log.remarks + "</div>" : ""}
      </div>`;
  });
}

function deleteLog(i) { logs.splice(i, 1); renderLogs(); }
</script>
</body>
</html>
