<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひまわり日報</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f4f4f4; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; margin-top: 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h3>🌻 ひまわり日報</h3>
    <label>日付</label><input type="date" id="date">
    <label>担当者</label>
    <select id="staff">
      <option value="">選択してください</option>
      <option value="石橋">石橋</option>
      <option value="角井">角井</option>
      <option value="櫻井">櫻井</option>
    </select>
    <label>区域</label><input type="text" id="area" placeholder="例：1区">
    <label>面談</label><input type="number" id="visits" value="0">
    <label>ポスティング</label><input type="number" id="postings" value="0">
    <label>備考</label><textarea id="remarks"></textarea>
    <button id="btn">送信する</button>
    <p id="msg" style="text-align:center; margin-top:10px;"></p>
  </div>

  <script>
    // ★ここに新しいURLを貼り付けてください★
    const URL = "https://script.google.com/macros/s/AKfycbxrFUzdm4ZVBLa2JApaVBmHD7J-UNW9CiCltjeSVEeq6Bpi0rkLCHfOgqJiYTvuiP2v/exec";

    document.getElementById("btn").onclick = async () => {
      const staff = document.getElementById("staff").value;
      if(!staff) return alert("担当者を選んでください");

      document.getElementById("btn").disabled = true;
      document.getElementById("msg").innerText = "送信中...";

      // GASが一番読み取りやすい形式で作る
      const params = new URLSearchParams();
      params.append("日付", document.getElementById("date").value);
      params.append("担当者", staff);
      params.append("区域", document.getElementById("area").value);
      params.append("面談", document.getElementById("visits").value);
      params.append("ポスティング", document.getElementById("postings").value);
      params.append("備考", document.getElementById("remarks").value);

      try {
        await fetch(URL, { method: "POST", mode: "no-cors", body: params });
        document.getElementById("msg").innerText = "✅ " + staff + "シートに送信しました！";
        document.getElementById("remarks").value = "";
      } catch (e) {
        document.getElementById("msg").innerText = "❌ エラーが発生しました";
      }
      document.getElementById("btn").disabled = false;
    };
    document.getElementById("date").value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
