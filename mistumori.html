<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見積書作成ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            color: #1976d2;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group select,
        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .option-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .option-card.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .option-subtitle {
            color: #888;
            font-size: 13px;
            margin-top: 3px;
        }

        .product-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .product-card {
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .product-card.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .product-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .product-desc {
            margin-top: 10px;
            color: #888;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-back {
            flex: 1;
            padding: 14px;
            background: #999;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: #777;
        }

        .btn-next {
            flex: 2;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-next:hover {
            background: #5568d3;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-add:hover {
            background: #45a049;
        }

        .btn-complete {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-complete:hover {
            background: #5568d3;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .preview {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .preview-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .preview-row:last-child {
            border-bottom: none;
        }

        .preview-label {
            color: #666;
        }

        .preview-value {
            font-weight: 600;
            color: #333;
        }

        .preview-section {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .preview-section-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .light-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .light-item-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .light-item-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .light-item-remove:hover {
            background: #ff5252;
        }

        .total-row {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
            color: #1976d2;
        }

        #pdfContainer {
            position: absolute;
            left: -9999px;
            top: 0;
        }
    </style>
</head>
<body>
    <div id="pdfContainer"></div>
    
    <div class="container">
        <h1>📋 見積書作成ツール</h1>

        <!-- ステップ0: 製品選択 -->
        <div class="step active" id="step0">
            <div class="step-indicator">ステップ 1/3 - 製品を選択してください</div>
            
            <div class="product-selection">
                <div class="product-card" onclick="selectProduct('arawuno')">
                    <div class="product-icon">🚽</div>
                    <div class="product-name">アラウーノ</div>
                    <div class="product-desc">パナソニック トイレ</div>
                </div>
                <div class="product-card" onclick="selectProduct('led')">
                    <div class="product-icon">💡</div>
                    <div class="product-name">LED照明/電球</div>
                    <div class="product-desc">照明製品</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-next" style="flex: 1;" onclick="goToStep1()">次へ</button>
            </div>
        </div>

        <!-- ====== LED照明のフロー ====== -->

        <!-- ステップ1: 照明器具 or 電球 -->
        <div class="step" id="step1_led">
            <div class="step-indicator">ステップ 2/4 - 照明器具か電球かを選択</div>
            
            <div class="form-group">
                <div class="option-card" onclick="selectLedType('fixture')">
                    <div class="option-title">💡 照明器具</div>
                    <div class="option-subtitle">天井・壁に取付ける照明</div>
                </div>
                <div class="option-card" onclick="selectLedType('bulb')">
                    <div class="option-title">🔦 電球</div>
                    <div class="option-subtitle">既存のソケットに取付ける電球</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep0()">戻る</button>
                <button class="btn-next" onclick="goToStep2_led()">次へ</button>
            </div>
        </div>

        <!-- ステップ2: LED照明詳細選択 -->
        <div class="step" id="step2_led">
            <div class="step-indicator">ステップ 3/4 - 照明を選択してください</div>
            
            <!-- 照明器具の場合 -->
            <div id="fixture_selection" style="display:none;">
                <div class="form-group">
                    <label>照明の種類</label>
                    <select id="fixtureCategory" onchange="updateFixtureOptions()">
                        <option value="">-- 選択してください --</option>
                        <option value="居室">居室</option>
                        <option value="外玄関">外玄関</option>
                        <option value="内玄関">内玄関</option>
                        <option value="台所">台所</option>
                        <option value="洗面所">洗面所</option>
                        <option value="浴室">浴室</option>
                        <option value="その他">その他（型番・金額を指定）</option>
                    </select>
                </div>

                <div id="otherFixtureOptions" style="display:none;">
                    <div class="form-group">
                        <label for="otherFixtureCode">型番</label>
                        <input type="text" id="otherFixtureCode" placeholder="例：HH-XXXX">
                    </div>
                    <div class="form-group">
                        <label for="otherFixturePrice">金額（円）</label>
                        <input type="number" id="otherFixturePrice" placeholder="0" min="0">
                    </div>
                </div>

                <div class="form-group" id="fixtureSubcategory" style="display:none;">
                    <label>詳細選択</label>
                    <select id="fixtureOption">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>

                <div id="kitchenType" style="display:none;">
                    <div class="form-group">
                        <label>台所の種類</label>
                        <select id="kitchenOption" onchange="updateKitchenOptions()">
                            <option value="">-- 選択してください --</option>
                            <option value="baselight">ベースライト</option>
                            <option value="sink">流し元ヒモ</option>
                        </select>
                    </div>

                    <div id="baselightOptions" style="display:none;">
                        <div class="form-group">
                            <label>ベースライト</label>
                            <select id="baselightOption">
                                <option value="">-- 選択してください --</option>
                                <option value="direct">1灯用直付 HH-SF0052N (26,100円)</option>
                                <option value="catchit1">1灯用カチッと HH-SF0050N (30,200円)</option>
                                <option value="catchit2">2灯用カチッと HH-SF0051N (34,300円)</option>
                            </select>
                        </div>
                    </div>

                    <div id="sinkOptions" style="display:none;">
                        <div class="form-group">
                            <label>流し元照明</label>
                            <select id="sinkOption">
                                <option value="">-- 選択してください --</option>
                                <option value="himo">流し元ヒモ HH-SF0043N (13,700円)</option>
                                <option value="switch">スイッチ HH-SF0045N (13,700円)</option>
                                <option value="touchless">タッチレス HH-SF0042N (23,300円)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 電球の場合 -->
            <div id="bulb_selection" style="display:none;">
                <div class="form-group">
                    <label>口金</label>
                    <select id="bulbBase" onchange="updateBulbOptions()">
                        <option value="">-- 選択してください --</option>
                        <option value="E17">E17</option>
                        <option value="E26">E26</option>
                    </select>
                </div>

                <div class="form-group" id="bulbType" style="display:none;">
                    <label>電球の種類</label>
                    <select id="bulbTypeOption" onchange="updateBulbTypeOptions()">
                        <option value="">-- 選択してください --</option>
                        <option value="normal">通常電球</option>
                        <option value="ball">ボール電球（E26のみ）</option>
                    </select>
                </div>

                <div class="form-group" id="bulbWattage" style="display:none;">
                    <label>ワット数</label>
                    <select id="bulbWatt">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>

                <div class="form-group" id="bulbBallWattage" style="display:none;">
                    <label>ボール電球のワット数</label>
                    <select id="bulbBallWatt">
                        <option value="">-- 選択してください --</option>
                        <option value="40">40形 (2,980円)</option>
                        <option value="60">60形 (3,360円)</option>
                        <option value="100">100形 (4,770円)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>色</label>
                    <select id="bulbColor">
                        <option value="">-- 選択してください --</option>
                        <option value="daylight">昼光色</option>
                        <option value="warmwhite">電球色</option>
                    </select>
                </div>
            </div>

            <!-- 共通: 個数と部屋の説明 -->
            <div class="form-group">
                <label for="lightQuantity">個数</label>
                <input type="number" id="lightQuantity" min="1" value="1">
            </div>

            <div class="form-group">
                <label for="roomDescription">部屋の説明 *</label>
                <input type="text" id="roomDescription" placeholder="例：2階寝室、1階廊下、内玄関吹き抜けなど" required>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep1_led()">戻る</button>
                <button class="btn-next" onclick="addLight()">照明を追加</button>
            </div>
        </div>

        <!-- ステップ3: 追加確認 -->
        <div class="step" id="step3_led">
            <div class="step-indicator">ステップ 4/4 - 追加照明の確認</div>
            
            <div class="preview" id="addedLightsPreview"></div>

            <button class="btn-add" onclick="addMoreLights()">➕ さらに照明を追加</button>
            <button class="btn-complete" onclick="completeAddingLights()">見積り内容の確認へ</button>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep2_led()">戻る</button>
            </div>
        </div>

        <!-- ステップ4: 顧客名入力・見積確認 -->
        <div class="step" id="step4_led">
            <div class="step-indicator">最終確認 - 顧客名を入力して見積書を生成</div>
            
            <div class="form-group">
                <label for="customerName">顧客名 *</label>
                <input type="text" id="customerName" placeholder="例：山田太郎" required>
            </div>

            <div class="preview" id="finalPreview"></div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep3_led()">戻る</button>
            </div>
            <button class="btn-generate" onclick="generateLedPDF()">📄 見積書PDF生成</button>
        </div>

        <!-- ====== アラウーノのフロー（既存）簡略版 ====== -->
        <div class="step" id="arawunoPlaceholder" style="text-align: center; color: #999; padding: 50px 0;">
            <p>アラウーノの見積書機能は準備中です</p>
            <button class="btn-back" onclick="goBackToStep0()" style="margin-top: 20px;">戻る</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        
        let selectedProduct = '';
        let selectedLedType = '';
        let selectedLights = [];

        // LED照明のデータ
        const ledData = {
            fixture: {
                '居室': {
                    '~6畳': { code: 'HH-CK0611CAS', price: 13700 },
                    '8畳': { code: 'HH-CM0834A', price: 21300 },
                    '10畳': { code: 'HH-CM1034A', price: 27200 },
                    '12畳': { code: 'HH-CM1234A', price: 32000 },
                    '14畳': { code: 'HH-CM1434A', price: 36700 },
                    '20畳': { code: 'HH-CM2033A', price: 54500 }
                },
                '外玄関': {
                    'センサあり': { code: 'HH-SL0010L', price: 24700 },
                    'センサなし': { code: 'HH-SL001L', price: 15800 }
                },
                '内玄関': {
                    'センサあり': { code: 'HH-SL0090N', price: 28100 },
                    'センサなし': { code: 'HH-SL0091N', price: 17800 }
                },
                '台所': {
                    baselight: {
                        'direct': { code: 'HH-SF0052N', price: 26100 },
                        'catchit1': { code: 'HH-SF0050N', price: 30200 },
                        'catchit2': { code: 'HH-SF0051N', price: 34300 }
                    },
                    sink: {
                        'himo': { code: 'HH-SF0043N', price: 13700 },
                        'switch': { code: 'HH-SF0045N', price: 13700 },
                        'touchless': { code: 'HH-SF0042N', price: 23300 }
                    }
                },
                '洗面所': {
                    '標準': { code: 'HH-SF0024N', price: 14400 }
                },
                '浴室': {
                    '標準': { code: 'HH-SF0024N', price: 14400 }
                }
            },
            bulb: {
                'E17': {
                    '40W': { price: 3570, code_daylight: 'LDA5DDGE17SZ4', code_warmwhite: 'LDA5LDGE17SZ4' },
                    '60W': { price: 4770, code_daylight: 'LDA8DDGE17SZ6', code_warmwhite: 'LDA8LDGE17SZ6' }
                },
                'E26': {
                    '40W': { price: 2280, code_daylight: 'LDA4DDGSZ4F', code_warmwhite: 'LDA5LDGSZ4F' },
                    '60W': { price: 3470, code_daylight: 'LDA7DDGSZ6F', code_warmwhite: 'LDA7LDGSZ6F' }
                },
                'ball': {
                    '40': { price: 2980, code_daylight: 'LDG4DG95W', code_warmwhite: 'LDG4LG95W' },
                    '60': { price: 3360, code_daylight: 'LDG6DG95W', code_warmwhite: 'LDG6LG95W' },
                    '100': { price: 4770, code_daylight: 'LDG11DG95W', code_warmwhite: 'LDG11LG95W' }
                }
            }
        };

        // 見積番号生成
        function generateEstimateNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}-${hours}${minutes}${seconds}`;
        }

        // Google Drive自動保存関数
        async function savePdfToDrive(pdfBlob, fileName, customerName, productType, totalAmount) {
            try {
                const reader = new FileReader();
                
                return new Promise((resolve, reject) => {
                    reader.onloadend = async function() {
                        const base64data = reader.result.split(',')[1];
                        
                        await fetch('https://script.google.com/macros/s/AKfycbxfU8a1-PpblTVMc7HDE7Bx9q1LbgOCSmhxoQNZLNZhiIVLEm28x8iEHrtQS7wXAhbB/exec', {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                pdfData: base64data,
                                fileName: fileName,
                                customerName: customerName,
                                productType: productType,
                                totalAmount: totalAmount,
                                timestamp: new Date().toISOString()
                            })
                        });
                        
                        resolve(true);
                    };
                    
                    reader.onerror = function() {
                        reject(new Error('PDF読み込みエラー'));
                    };
                    
                    reader.readAsDataURL(pdfBlob);
                });
            } catch (error) {
                console.error('Google Drive保存エラー:', error);
                alert('Google Driveへの保存に失敗しました。PDFはダウンロードされました。');
                return false;
            }
        }

        function selectProduct(product) {
            selectedProduct = product;
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function goToStep1() {
            if (!selectedProduct) {
                alert('製品を選択してください');
                return;
            }

            showStep('step0');
            if (selectedProduct === 'led') {
                showStep('step1_led');
            } else {
                showStep('arawunoPlaceholder');
            }
        }

        function goBackToStep0() {
            selectedProduct = '';
            selectedLedType = '';
            selectedLights = [];
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });
            showStep('step0');
        }

        function selectLedType(type) {
            selectedLedType = type;
            document.querySelectorAll('#step1_led .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function goToStep2_led() {
            if (!selectedLedType) {
                alert('照明器具か電球かを選択してください');
                return;
            }

            if (selectedLedType === 'fixture') {
                document.getElementById('fixture_selection').style.display = 'block';
                document.getElementById('bulb_selection').style.display = 'none';
            } else {
                document.getElementById('fixture_selection').style.display = 'none';
                document.getElementById('bulb_selection').style.display = 'block';
            }

            showStep('step1_led');
            showStep('step2_led');
        }

        function goBackToStep1_led() {
            showStep('step2_led');
            showStep('step1_led');
        }

        function updateFixtureOptions() {
            const category = document.getElementById('fixtureCategory').value;
            const subcategoryDiv = document.getElementById('fixtureSubcategory');
            const kitchenDiv = document.getElementById('kitchenType');
            const otherDiv = document.getElementById('otherFixtureOptions');
            const optionSelect = document.getElementById('fixtureOption');

            kitchenDiv.style.display = 'none';
            subcategoryDiv.style.display = 'none';
            otherDiv.style.display = 'none';
            document.getElementById('baselightOptions').style.display = 'none';
            document.getElementById('sinkOptions').style.display = 'none';

            if (category === 'その他') {
                otherDiv.style.display = 'block';
            } else if (category === '台所') {
                kitchenDiv.style.display = 'block';
            } else if (category) {
                subcategoryDiv.style.display = 'block';
                optionSelect.innerHTML = '<option value="">-- 選択してください --</option>';
                
                if (ledData.fixture[category]) {
                    Object.keys(ledData.fixture[category]).forEach(key => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = key + ' (¥' + ledData.fixture[category][key].price.toLocaleString() + ')';
                        optionSelect.appendChild(option);
                    });
                }
            }
        }

        function updateKitchenOptions() {
            const kitchenType = document.getElementById('kitchenOption').value;
            const baselightDiv = document.getElementById('baselightOptions');
            const sinkDiv = document.getElementById('sinkOptions');

            baselightDiv.style.display = 'none';
            sinkDiv.style.display = 'none';

            if (kitchenType === 'baselight') {
                baselightDiv.style.display = 'block';

                sinkDiv.style.display = 'block';

        function updateBulbOptions() {
            const base = document.getElementById('bulbBase').value;
            const typeDiv = document.getElementById('bulbType');
            const wattageDiv = document.getElementById('bulbWattage');
            const ballWattageDiv = document.getElementById('bulbBallWattage');
            const wattSelect = document.getElementById('bulbWatt');

            typeDiv.style.display = 'none';
            wattageDiv.style.display = 'none';
            ballWattageDiv.style.display = 'none';

            if (base === 'E17') {
                wattageDiv.style.display = 'block';
                wattSelect.innerHTML = '<option value="">-- 選択してください --</option>';
                
                if (ledData.bulb[base]) {
                    Object.keys(ledData.bulb[base]).forEach(key => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = key + ' (¥' + ledData.bulb[base][key].price.toLocaleString() + ')';
                        wattSelect.appendChild(option);
                    });
                }
            } else if (base === 'E26') {
                typeDiv.style.display = 'block';
            }
        }

        function updateBulbTypeOptions() {
            const type = document.getElementById('bulbTypeOption').value;
            const base = document.getElementById('bulbBase').value;
            const wattageDiv = document.getElementById('bulbWattage');
            const ballWattageDiv = document.getElementById('bulbBallWattage');
            const wattSelect = document.getElementById('bulbWatt');

            wattageDiv.style.display = 'none';
            ballWattageDiv.style.display = 'none';

            if (type === 'ball') {
                ballWattageDiv.style.display = 'block';
            } else if (type === 'normal' && base) {
                wattageDiv.style.display = 'block';
                wattSelect.innerHTML = '<option value="">-- 選択してください --</option>';
                
                if (ledData.bulb[base]) {
                    Object.keys(ledData.bulb[base]).forEach(key => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = key + ' (¥' + ledData.bulb[base][key].price.toLocaleString() + ')';
                        wattSelect.appendChild(option);

        function resetForm() {
            document.getElementById('lightQuantity').value = '1';
            document.getElementById('roomDescription').value = '';
            document.getElementById('fixtureCategory').value = '';
            document.getElementById('otherFixtureCode').value = '';
            document.getElementById('otherFixturePrice').value = '';
            document.getElementById('bulbBase').value = '';
            document.getElementById('bulbTypeOption').value = '';
            document.getElementById('bulbWatt').value = '';
            document.getElementById('bulbBallWatt').value = '';
            document.getElementById('bulbColor').value = '';
            document.getElementById('kitchenOption').value = '';
            document.getElementById('baselightOption').value = '';
            document.getElementById('sinkOption').value = '';
            document.getElementById('fixtureOption').value = '';
            
            document.getElementById('fixture_selection').style.display = 'none';
            document.getElementById('bulb_selection').style.display = 'none';
            document.getElementById('otherFixtureOptions').style.display = 'none';
            document.getElementById('fixtureSubcategory').style.display = 'none';
            document.getElementById('kitchenType').style.display = 'none';
            document.getElementById('baselightOptions').style.display = 'none';
            document.getElementById('sinkOptions').style.display = 'none';

            document.getElementById('bulbType').style.display = 'none';
            document.getElementById('bulbBallWattage').style.display = 'none';

        function addLight() {
            const quantity = parseInt(document.getElementById('lightQuantity').value);
            const room = document.getElementById('roomDescription').value.trim();

            if (!quantity || quantity < 1) {
                alert('個数を入力してください');
                return;
            }
            if (!room) {
                alert('部屋の説明を入力してください');
                return;
            }

            let lightData = {
                quantity: quantity,
                room: room,
                workCost: 0,
                total: 0
            };

            if (selectedLedType === 'fixture') {
                const category = document.getElementById('fixtureCategory').value;
                
                if (!category) {
                    alert('照明の種類を選択してください');
                    return;
                }

                if (category === 'その他') {
                    const code = document.getElementById('otherFixtureCode').value.trim();
                    const price = parseInt(document.getElementById('otherFixturePrice').value);

                    if (!code) {
                        alert('型番を入力してください');
                        return;
                    }
                    if (!price || price < 0) {
                        alert('金額を入力してください');
                        return;
                    }

                    lightData.type = '照明器具（その他）';
                    lightData.model = code;
                    lightData.code = code;
                    lightData.price = price;
                } else if (category === '台所') {
                    const kitchenType = document.getElementById('kitchenOption').value;
                    if (!kitchenType) {
                        alert('台所の種類を選択してください');
                        return;
                    }

                    if (kitchenType === 'baselight') {
                        const option = document.getElementById('baselightOption').value;
                        if (!option) {
                            alert('ベースライトを選択してください');
                            return;
                        }
                        const data = ledData.fixture.台所.baselight[option];
                        lightData.type = '照明器具（台所・ベースライト）';
                        lightData.model = option;
                        lightData.code = data.code;
                        lightData.price = data.price;
                    } else {
                        const option = document.getElementById('sinkOption').value;
                        if (!option) {
                            alert('流し元照明を選択してください');
                            return;
                        }
                        const data = ledData.fixture.台所.sink[option];
                        lightData.type = '照明器具（台所・流し元）';
                        lightData.model = option;
                        lightData.code = data.code;
                        lightData.price = data.price;
                    }
                } else {
                    const option = document.getElementById('fixtureOption').value;
                    if (!option) {
                        alert('詳細を選択してください');
                        return;
                    }
                    const data = ledData.fixture[category][option];
                    lightData.type = `照明器具（${category}）`;
                    lightData.model = option;
                    lightData.code = data.code;
                    lightData.price = data.price;
                }

                lightData.workCost = 3300;
            } else {
                const base = document.getElementById('bulbBase').value;
                const color = document.getElementById('bulbColor').value;

                if (!base || !color) {
                    alert('必要な項目を選択してください');
                    return;
                }

                const colorCode = color === 'daylight' ? 'code_daylight' : 'code_warmwhite';
                const colorName = color === 'daylight' ? '昼光色' : '電球色';

                if (base === 'E17') {
                    const watt = document.getElementById('bulbWatt').value;
                    if (!watt) {
                        alert('ワット数を選択してください');
                        return;
                    }
                    const data = ledData.bulb[base][watt];
                    lightData.type = '電球';
                    lightData.model = `${base} ${watt} ${colorName}`;
                    lightData.code = data[colorCode];
                    lightData.price = data.price;
                } else {
                    const type = document.getElementById('bulbTypeOption').value;
                    if (!type) {
                        alert('電球の種類を選択してください');
                        return;
                    }

                    if (type === 'ball') {
                        const ballWatt = document.getElementById('bulbBallWatt').value;
                        if (!ballWatt) {
                            alert('ボール電球のワット数を選択してください');
                            return;
                        }
                        const data = ledData.bulb.ball[ballWatt];
                        lightData.type = 'ボール電球';
                        lightData.model = `${ballWatt}形 ${colorName}`;
                        lightData.code = data[colorCode];
                        lightData.price = data.price;
                    } else {
                        const watt = document.getElementById('bulbWatt').value;
                        if (!watt) {
                            alert('ワット数を選択してください');
                            return;
                        }
                        const data = ledData.bulb[base][watt];
                        lightData.type = '電球';
                        lightData.model = `${base} ${watt} ${colorName}`;
                        lightData.code = data[colorCode];
                        lightData.price = data.price;
                    }
                }

                lightData.workCost = 0;
            }

            lightData.total = (lightData.price + lightData.workCost) * quantity;
            selectedLights.push(lightData);

            resetForm();
            updateAddedLightsPreview();
            showStep('step2_led');
            showStep('step3_led');
        }

        function updateAddedLightsPreview() {
            const preview = document.getElementById('addedLightsPreview');
            
            let html = '<div class="preview-title">追加した照明一覧</div>';
            
            selectedLights.forEach((light, index) => {
                html += `<div class="light-item">
                    <div class="light-item-header">
                        <div>${light.room} / ${light.model} × ${light.quantity}個</div>
                        <button class="light-item-remove" onclick="removeLight(${index})">削除</button>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">照明種</span>
                        <span class="preview-value">${light.type}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">単価</span>
                        <span class="preview-value">¥${light.price.toLocaleString()}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">工事費</span>
                        <span class="preview-value">¥${(light.workCost).toLocaleString()}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">小計</span>
                        <span class="preview-value">¥${light.total.toLocaleString()}</span>
                    </div>
                </div>`;
            });

            const grandTotal = selectedLights.reduce((sum, light) => sum + light.total, 0);
            html += `<div class="total-row">
                <span>合計</span>
                <span>¥${grandTotal.toLocaleString()}</span>
            </div>`;

            preview.innerHTML = html;
        }

        function removeLight(index) {
            selectedLights.splice(index, 1);
            updateAddedLightsPreview();
        }

        function addMoreLights() {
            selectedLedType = '';
            document.querySelectorAll('#step1_led .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            resetForm();
            showStep('step3_led');
            showStep('step1_led');
        }

        function completeAddingLights() {
            if (selectedLights.length === 0) {
                alert('少なくとも1つの照明を追加してください');
                return;
            }
            updateFinalPreview();
            showStep('step3_led');
            showStep('step4_led');
        }

        function updateFinalPreview() {
            const preview = document.getElementById('finalPreview');
            
            let html = '<div class="preview-title">見積内容</div>';
            
            selectedLights.forEach((light) => {
                html += `<div class="preview-section">
                    <div class="preview-section-title">${light.room}</div>
                    <div class="preview-row">
                        <span class="preview-label">照明種</span>
                        <span class="preview-value">${light.type}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">型番/詳細</span>
                        <span class="preview-value">${light.code ? light.code + ' - ' : ''}${light.model}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">個数</span>
                        <span class="preview-value">${light.quantity}個</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">単価</span>
                        <span class="preview-value">¥${light.price.toLocaleString()}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">工事費/個</span>
                        <span class="preview-value">¥${light.workCost.toLocaleString()}</span>
                    </div>
                    <div class="preview-row">
                        <span class="preview-label">小計</span>
                        <span class="preview-value">¥${light.total.toLocaleString()}</span>
                    </div>
                </div>`;
            });

            const grandTotal = selectedLights.reduce((sum, light) => sum + light.total, 0);
            html += `<div class="total-row">
                <span>合計金額（税込）</span>
                <span>¥${grandTotal.toLocaleString()}</span>
            </div>`;

            preview.innerHTML = html;
        }

        function goBackToStep3_led() {
            showStep('step4_led');
            showStep('step3_led');
        }

        function goBackToStep2_led() {
            showStep('step3_led');
            showStep('step2_led');
        }

        async function generateLedPDF() {
            const customerName = document.getElementById('customerName').value.trim();
            if (!customerName) {
                alert('顧客名を入力してください');
                return;
            }

            if (selectedLights.length === 0) {
                alert('照明を追加してください');
                return;
            }

            const grandTotal = selectedLights.reduce((sum, light) => sum + light.total, 0);
            const estimateNo = generateEstimateNumber();

            let lightsHTML = '';
            selectedLights.forEach((light, index) => {
                const itemPrice = light.price * light.quantity;
                const displayName = light.code ? `${light.type}（${light.code}）` : light.type;
                
                lightsHTML += `
                    <div style="border-bottom: none; padding-bottom: 5px; display: flex; justify-content: space-between; padding: 10px 15px; font-size: 14px;">
                        <span><strong>${index + 1}. ${light.room}</strong></span>
                        <span></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 5px 15px 5px 45px; font-size: 14px;">
                        <span>${displayName}</span>
                        <span></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 5px 15px 5px 45px; font-size: 14px;">
                        <span>個数：${light.quantity}個 × ¥${light.price.toLocaleString()}</span>
                        <span>¥${itemPrice.toLocaleString()}</span>
                    </div>
                    ${light.workCost > 0 ? `
                    <div style="display: flex; justify-content: space-between; padding: 5px 15px 5px 45px; font-size: 14px;">
                        <span>工事費</span>
                        <span>¥${(light.workCost * light.quantity).toLocaleString()}</span>
                    </div>` : ''}
                    <div style="display: flex; justify-content: space-between; padding: 10px 15px 10px 45px; font-weight: 600; background: #fafafa; border-bottom: 1px solid #ddd; font-size: 14px;">
                        <span>小計</span>
                        <span>¥${light.total.toLocaleString()}</span>
                    </div>
                `;
            });

            const pdfHTML = `
                <div style="width: 794px; background: white; padding: 50px 60px; font-family: 'Yu Gothic', sans-serif;">
                    <div style="text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 3px solid #667eea;">
                        <div style="font-size: 32px; font-weight: bold; margin-bottom: 20px;">お見積書</div>
                        <div style="text-align: right; font-size: 13px; line-height: 1.6;">
                            <div style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">ヤハタデンキ</div>
                            <div>〒263-0005 千葉市稲毛区長沼町330-24</div>
                            <div>TEL: 043-259-0463</div>
                        </div>
                    </div>
                    <div style="font-size: 13px; margin-bottom: 15px; color: #666;">見積番号：${estimateNo}</div>
                    <div style="display: flex; justify-content: space-between; margin: 25px 0; font-size: 15px;">
                        <span><strong>${customerName}</strong> 様</span>
                        <span>作成日：${new Date().toLocaleDateString('ja-JP')}</span>
                    </div>
                    
                    <div style="margin: 25px 0;">
                        <div style="background: #667eea; color: white; padding: 10px 15px; font-weight: bold; margin-bottom: 12px; font-size: 16px;">照明明細</div>
                        ${lightsHTML}
                    </div>

                    <div style="margin-top: 30px; border: 3px solid #1976d2; background: #e3f2fd; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 20px; font-weight: bold; color: #1976d2;">合計金額（税込）</span>
                        <span style="font-size: 26px; font-weight: bold; color: #1976d2;">¥${grandTotal.toLocaleString()}</span>
                    </div>
                </div>
            `;

            const container = document.getElementById('pdfContainer');
            container.innerHTML = pdfHTML;
            const element = container.firstChild;

            const canvas = await html2canvas(element, { scale: 2.5, useCORS: true, logging: false });
            
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 210;
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;

            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            
            const fileName = 'LED照明見積書_' + customerName + '_' + new Date().toLocaleDateString('ja-JP').replace(/\//g, '') + '.pdf';
            
            // PDFをダウンロード
            pdf.save(fileName);
            
            // Google Driveに自動保存
            const pdfBlob = pdf.output('blob');
            await savePdfToDrive(pdfBlob, fileName, customerName, 'LED照明', grandTotal);
            
            alert('見積書を作成し、Google Driveに保存しました！');
            
            container.innerHTML = '';
        }

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById(stepId).classList.add('active');
        }
