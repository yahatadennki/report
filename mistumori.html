<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アラウーノ見積書作成</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            color: #1976d2;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group select,
        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .option-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .option-card.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option-card input[type="radio"] {
            margin-right: 10px;
        }

        .option-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .option-subtitle {
            color: #888;
            font-size: 13px;
            margin-top: 3px;
        }

        .option-price {
            color: #2196F3;
            margin-top: 5px;
            font-size: 15px;
            font-weight: 600;
        }

        .checkbox-group {
            margin: 10px 0;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkbox-group label:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-back {
            flex: 1;
            padding: 14px;
            background: #999;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: #777;
        }

        .btn-next {
            flex: 2;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-next:hover {
            background: #5568d3;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .preview {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .preview-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .preview-row:last-child {
            border-bottom: none;
        }

        .preview-label {
            color: #666;
        }

        .preview-value {
            font-weight: 600;
            color: #333;
        }

        .preview-section {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .preview-section-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .total-row {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚽 アラウーノ見積書作成</h1>

        <!-- ステップ1: 機種選択 -->
        <div class="step active" id="step1">
            <div class="step-indicator">ステップ 1/5 - 機種を選択してください</div>
            
            <div class="form-group">
                <div class="option-card" onclick="selectModel('arawuno')">
                    <input type="radio" name="model" value="arawuno" id="model_arawuno">
                    <label for="model_arawuno">
                        <div class="option-title">アラウーノ</div>
                        <div class="option-subtitle">CH150CWSK</div>
                        <div class="option-price">¥313,800</div>
                    </label>
                </div>
                <div class="option-card" onclick="selectModel('arawunoS')">
                    <input type="radio" name="model" value="arawunoS" id="model_arawunoS">
                    <label for="model_arawunoS">
                        <div class="option-title">アラウーノS</div>
                        <div class="option-subtitle">CH1601WSK</div>
                        <div class="option-price">¥207,500</div>
                    </label>
                </div>
                <div class="option-card" onclick="selectModel('arawunoV')">
                    <input type="radio" name="model" value="arawunoV" id="model_arawunoV">
                    <label for="model_arawunoV">
                        <div class="option-title">アラウーノV</div>
                        <div class="option-subtitle">手洗い・便座を次のステップで選択</div>
                        <div class="option-price">¥100,000～</div>
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-next" onclick="goToStep2()">次へ</button>
            </div>
        </div>

        <!-- ステップ2: オプション選択 -->
        <div class="step" id="step2">
            <div class="step-indicator">ステップ 2/5 - オプションを選択してください</div>
            
            <!-- アラウーノ・アラウーノS用 -->
            <div id="options_arawuno_s" style="display:none;">
                <div class="form-group">
                    <label>手洗い器の有無</label>
                    <div class="option-card" onclick="selectWashbasin('none')">
                        <input type="radio" name="washbasin" value="none" id="washbasin_none">
                        <label for="washbasin_none">
                            <div class="option-title">トイレのみ（標準）</div>
                            <div class="option-price">追加費用なし</div>
                        </label>
                    </div>
                    <div class="option-card" onclick="selectWashbasin('with')">
                        <input type="radio" name="washbasin" value="with" id="washbasin_with">
                        <label for="washbasin_with">
                            <div class="option-title">手洗い器有（連動）</div>
                            <div class="option-subtitle">XCH10EH</div>
                            <div class="option-price">本体 ¥55,000 + 取付工事 ¥11,000</div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- アラウーノV用 -->
            <div id="options_arawunoV" style="display:none;">
                <div class="form-group">
                    <label>手洗いの有無</label>
                    <div class="option-card" onclick="selectVWashbasin('without')">
                        <input type="radio" name="v_washbasin" value="without" id="v_washbasin_without">
                        <label for="v_washbasin_without">
                            <div class="option-title">手洗い無</div>
                            <div class="option-subtitle">CH3010WS</div>
                            <div class="option-price">¥100,000</div>
                        </label>
                    </div>
                    <div class="option-card" onclick="selectVWashbasin('with')">
                        <input type="radio" name="v_washbasin" value="with" id="v_washbasin_with">
                        <label for="v_washbasin_with">
                            <div class="option-title">手洗い有</div>
                            <div class="option-subtitle">CH3010WST</div>
                            <div class="option-price">¥111,700</div>
                        </label>
                    </div>
                </div>

                <div class="form-group" id="v_seat_selection" style="display:none;">
                    <label>便座を選択してください</label>
                    <div class="option-card" onclick="selectVSeat('premium')">
                        <input type="radio" name="v_seat" value="premium" id="v_seat_premium">
                        <label for="v_seat_premium">
                            <div class="option-title">快適機能（一体型）</div>
                            <div class="option-price">+¥82,500</div>
                        </label>
                    </div>
                    <div class="option-card" onclick="selectVSeat('standard')">
                        <input type="radio" name="v_seat" value="standard" id="v_seat_standard">
                        <label for="v_seat_standard">
                            <div class="option-title">標準機能（一体型）</div>
                            <div class="option-price">+¥65,800</div>
                        </label>
                    </div>
                    <div class="option-card" onclick="selectVSeat('basic')">
                        <input type="radio" name="v_seat" value="basic" id="v_seat_basic">
                        <label for="v_seat_basic">
                            <div class="option-title">基本機能</div>
                            <div class="option-price">+¥52,500</div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep1()">戻る</button>
                <button class="btn-next" onclick="goToStep3()">次へ</button>
            </div>
        </div>

        <!-- ステップ3: 排水芯選択 -->
        <div class="step" id="step3">
            <div class="step-indicator">ステップ 3/5 - 排水芯を選択してください</div>
            
            <div class="form-group">
                <label>床排水 - 排水芯を選んでください</label>
                <div class="option-card" onclick="selectDrain('120-200')">
                    <input type="radio" name="drain" value="120-200" id="drain_120">
                    <label for="drain_120">
                        <div class="option-title">排水芯 120～200mm</div>
                        <div class="option-price" id="price_120">部品代: ¥11,000</div>
                    </label>
                </div>
                <div class="option-card" onclick="selectDrain('305-510')">
                    <input type="radio" name="drain" value="305-510" id="drain_305">
                    <label for="drain_305">
                        <div class="option-title">排水芯 305～510mm</div>
                        <div class="option-price" id="price_305">部品代: ¥22,000</div>
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep2()">戻る</button>
                <button class="btn-next" onclick="goToStep4()">次へ</button>
            </div>
        </div>

        <!-- ステップ4: 工事内容選択 -->
        <div class="step" id="step4">
            <div class="step-indicator">ステップ 4/5 - 必要な工事を選択してください</div>
            
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="work_install" checked disabled>
                    <span>アラウーノ本体設置工事 ¥19,800（必須）</span>
                </label>
                <label>
                    <input type="checkbox" id="work_water" checked disabled>
                    <span>アラウーノ給水接続工事 ¥6,600（必須）</span>
                </label>
                <label>
                    <input type="checkbox" id="work_flange" onchange="updateWorkSelection()">
                    <span>フランジ交換工事 ¥8,800</span>
                </label>
                <label>
                    <input type="checkbox" id="work_removal" onchange="updateWorkSelection()">
                    <span>既設トイレ撤去工事 ¥6,600</span>
                </label>
                <label>
                    <input type="checkbox" id="work_disposal" onchange="updateWorkSelection()">
                    <span>既設トイレ処分費 ¥5,500</span>
                </label>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep3()">戻る</button>
                <button class="btn-next" onclick="goToStep5()">次へ</button>
            </div>
        </div>

        <!-- ステップ5: 確認・顧客名入力 -->
        <div class="step" id="step5">
            <div class="step-indicator">ステップ 5/5 - 内容確認と顧客名入力</div>
            
            <div class="form-group">
                <label for="customerName">顧客名 *</label>
                <input type="text" id="customerName" placeholder="例：山田太郎" required>
            </div>

            <div class="preview" id="preview">
                <!-- プレビューがここに表示されます -->
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep4()">戻る</button>
            </div>
            <button class="btn-generate" onclick="generatePDF()">📄 見積書PDF生成</button>
        </div>
    </div>

    <script>
        // 選択データを保存
        let selectedData = {
            model: '',
            modelName: '',
            modelCode: '',
            modelPrice: 0,
            washbasin: '',
            washbasinPrice: 0,
            washbasinWorkPrice: 0,
            vWashbasin: '',
            vWashbasinCode: '',
            vWashbasinPrice: 0,
            vSeat: '',
            vSeatName: '',
            vSeatPrice: 0,
            drain: '',
            drainParts: '',
            partsCost: 0
        };

        // 機種データ
        const modelData = {
            'arawuno': {
                name: 'アラウーノ',
                code: 'CH150CWSK',
                price: 313800
            },
            'arawunoS': {
                name: 'アラウーノS',
                code: 'CH1601WSK',
                price: 207500
            },
            'arawunoV': {
                name: 'アラウーノV',
                code: '',
                price: 0
            }
        };

        // アラウーノV 手洗いデータ
        const vWashbasinData = {
            'without': { code: 'CH3010WS', price: 100000 },
            'with': { code: 'CH3010WST', price: 111700 }
        };

        // アラウーノV 便座データ
        const vSeatData = {
            'premium': { name: '快適機能（一体型）', price: 82500 },
            'standard': { name: '標準機能（一体型）', price: 65800 },
            'basic': { name: '基本機能', price: 52500 }
        };

        // 部品型番と価格のマッピング
        const partsData = {
            'arawuno': {
                '120-200': { code: 'CH150F', price: 11000 },
                '305-510': { code: 'CH150FW', price: 22000 }
            },
            'arawunoS': {
                '120-200': { code: 'CH160F', price: 11000 },
                '305-510': { code: 'CH160FW', price: 22000 }
            },
            'arawunoV': {
                '120-200': { code: 'CH301F', price: 11000 },
                '305-510': { code: 'CH301FW', price: 22000 }
            }
        };

        // 工事費用
        const workCosts = {
            install: 19800,
            water: 6600,
            flange: 8800,
            removal: 6600,
            disposal: 5500
        };

        function selectModel(model) {
            selectedData.model = model;
            selectedData.modelName = modelData[model].name;
            selectedData.modelCode = modelData[model].code;
            selectedData.modelPrice = modelData[model].price;
            
            // リセット
            selectedData.washbasin = '';
            selectedData.vWashbasin = '';
            selectedData.vSeat = '';
            
            // ラジオボタンをチェック
            document.getElementById('model_' + model).checked = true;
            
            // カードの選択状態を更新
            document.querySelectorAll('#step1 .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function selectWashbasin(type) {
            selectedData.washbasin = type;
            if (type === 'none') {
                selectedData.washbasinPrice = 0;
                selectedData.washbasinWorkPrice = 0;
            } else {
                selectedData.washbasinPrice = 55000;
                selectedData.washbasinWorkPrice = 11000;
            }
            
            document.getElementById('washbasin_' + type).checked = true;
            document.querySelectorAll('#options_arawuno_s .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function selectVWashbasin(type) {
            selectedData.vWashbasin = type;
            selectedData.vWashbasinCode = vWashbasinData[type].code;
            selectedData.vWashbasinPrice = vWashbasinData[type].price;
            
            // 本体のコードと価格を更新
            selectedData.modelCode = vWashbasinData[type].code;
            selectedData.modelPrice = vWashbasinData[type].price;
            
            document.getElementById('v_washbasin_' + type).checked = true;
            document.querySelectorAll('#options_arawunoV .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // 便座選択を表示
            document.getElementById('v_seat_selection').style.display = 'block';
        }

        function selectVSeat(type) {
            selectedData.vSeat = type;
            selectedData.vSeatName = vSeatData[type].name;
            selectedData.vSeatPrice = vSeatData[type].price;
            
            document.getElementById('v_seat_' + type).checked = true;
            document.querySelectorAll('#v_seat_selection .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function selectDrain(drain) {
            selectedData.drain = drain;
            const parts = partsData[selectedData.model][drain];
            selectedData.drainParts = parts.code;
            selectedData.partsCost = parts.price;
            
            document.getElementById('drain_' + drain.split('-')[0]).checked = true;
            document.querySelectorAll('#step3 .option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function goToStep2() {
            if (!selectedData.model) {
                alert('機種を選択してください');
                return;
            }
            
            // オプション表示を切り替え
            if (selectedData.model === 'arawunoV') {
                document.getElementById('options_arawuno_s').style.display = 'none';
                document.getElementById('options_arawunoV').style.display = 'block';
            } else {
                document.getElementById('options_arawuno_s').style.display = 'block';
                document.getElementById('options_arawunoV').style.display = 'none';
            }
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function goBackToStep1() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
        }

        function goToStep3() {
            if (selectedData.model === 'arawunoV') {
                if (!selectedData.vWashbasin) {
                    alert('手洗いの有無を選択してください');
                    return;
                }
                if (!selectedData.vSeat) {
                    alert('便座を選択してください');
                    return;
                }
            } else {
                if (!selectedData.washbasin) {
                    alert('手洗い器の有無を選択してください');
                    return;
                }
            }
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }

        function goBackToStep2() {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function goToStep4() {
            if (!selectedData.drain) {
                alert('排水芯を選択してください');
                return;
            }
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step4').classList.add('active');
        }

        function goBackToStep3() {
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }

        function goToStep5() {
            updatePreview();
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step5').classList.add('active');
        }

        function goBackToStep4() {
            document.getElementById('step5').classList.remove('active');
            document.getElementById('step4').classList.add('active');
        }

        function updateWorkSelection() {
            // プレビュー更新のため、ステップ5にいる場合のみ更新
            if (document.getElementById('step5').classList.contains('active')) {
                updatePreview();
            }
        }

        function updatePreview() {
            const preview = document.getElementById('preview');
            
            // 工事費の計算
            let totalWork = workCosts.install + workCosts.water;
            let workList = [
                { name: 'アラウーノ本体設置工事', price: workCosts.install },
                { name: 'アラウーノ給水接続工事', price: workCosts.water }
            ];

            // 手洗い器取付工事（アラウーノ/S）
            if (selectedData.washbasin === 'with') {
                totalWork += selectedData.washbasinWorkPrice;
                workList.push({ name: '手洗い器取付工事', price: selectedData.washbasinWorkPrice });
            }

            if (document.getElementById('work_flange').checked) {
                totalWork += workCosts.flange;
                workList.push({ name: 'フランジ交換工事', price: workCosts.flange });
            }
            if (document.getElementById('work_removal').checked) {
                totalWork += workCosts.removal;
                workList.push({ name: '既設トイレ撤去工事', price: workCosts.removal });
            }
            if (document.getElementById('work_disposal').checked) {
                totalWork += workCosts.disposal;
                workList.push({ name: '既設トイレ処分費', price: workCosts.disposal });
            }

            // 商品代の計算
            let totalProduct = selectedData.modelPrice + selectedData.partsCost;
            if (selectedData.washbasinPrice > 0) {
                totalProduct += selectedData.washbasinPrice;
            }
            if (selectedData.vSeatPrice > 0) {
                totalProduct += selectedData.vSeatPrice;
            }

            const grandTotal = totalProduct + totalWork;

            let html = `<div class="preview-title">見積内容</div>`;
            
            // 機種情報
            html += `<div class="preview-section">
                <div class="preview-section-title">機種情報</div>
                <div class="preview-row">
                    <span class="preview-label">機種</span>
                    <span class="preview-value">${selectedData.modelName}</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">型番</span>
                    <span class="preview-value">${selectedData.modelCode}</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">本体価格</span>
                    <span class="preview-value">¥${selectedData.modelPrice.toLocaleString()}</span>
                </div>`;

            // アラウーノ/S の手洗い器
            if (selectedData.model !== 'arawunoV' && selectedData.washbasin === 'with') {
                html += `<div class="preview-row">
                    <span class="preview-label">手洗い器（XCH10EH）</span>
                    <span class="preview-value">¥${selectedData.washbasinPrice.toLocaleString()}</span>
                </div>`;
            }

            // アラウーノV の便座
            if (selectedData.model === 'arawunoV') {
                html += `<div class="preview-row">
                    <span class="preview-label">便座（${selectedData.vSeatName}）</span>
                    <span class="preview-value">¥${selectedData.vSeatPrice.toLocaleString()}</span>
                </div>`;
            }

            html += `</div>`;

            // 排水芯情報
            html += `<div class="preview-section">
                <div class="preview-section-title">排水芯部品</div>
                <div class="preview-row">
                    <span class="preview-label">排水芯</span>
                    <span class="preview-value">${selectedData.drain}mm</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">部品型番</span>
                    <span class="preview-value">${selectedData.drainParts}</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">部品代</span>
                    <span class="preview-value">¥${selectedData.partsCost.toLocaleString()}</span>
                </div>
            </div>`;

            // 工事内容
            html += `<div class="preview-section">
                <div class="preview-section-title">工事内容</div>`;
            
            workList.forEach(work => {
                html += `<div class="preview-row">
                    <span class="preview-label">${work.name}</span>
                    <span class="preview-value">¥${work.price.toLocaleString()}</span>
                </div>`;
            });

            html += `</div>`;

            // 合計
            html += `<div class="total-row">
                <span>合計金額（税込）</span>
                <span>¥${grandTotal.toLocaleString()}</span>
            </div>`;

            preview.innerHTML = html;
        }

        function generatePDF() {
            const customerName = document.getElementById('customerName').value.trim();
            if (!customerName) {
                alert('顧客名を入力してください');
                return;
            }

            // 工事費の計算
            let totalWork = workCosts.install + workCosts.water;
            let workList = [
                { name: 'アラウーノ本体設置工事', price: workCosts.install },
                { name: 'アラウーノ給水接続工事', price: workCosts.water }
            ];

            if (selectedData.washbasin === 'with') {
                totalWork += selectedData.washbasinWorkPrice;
                workList.push({ name: '手洗い器取付工事', price: selectedData.washbasinWorkPrice });
            }

            if (document.getElementById('work_flange').checked) {
                totalWork += workCosts.flange;
                workList.push({ name: 'フランジ交換工事', price: workCosts.flange });
            }
            if (document.getElementById('work_removal').checked) {
                totalWork += workCosts.removal;
                workList.push({ name: '既設トイレ撤去工事', price: workCosts.removal });
            }
            if (document.getElementById('work_disposal').checked) {
                totalWork += workCosts.disposal;
                workList.push({ name: '既設トイレ処分費', price: workCosts.disposal });
            }

            // 商品代の計算
            let totalProduct = selectedData.modelPrice + selectedData.partsCost;
            let productList = [
                { name: `${selectedData.modelName}（${selectedData.modelCode}）`, price: selectedData.modelPrice }
            ];

            if (selectedData.washbasinPrice > 0) {
                totalProduct += selectedData.washbasinPrice;
                productList.push({ name: '手洗い器（XCH10EH）', price: selectedData.washbasinPrice });
            }

            if (selectedData.vSeatPrice > 0) {
                totalProduct += selectedData.vSeatPrice;
                productList.push({ name: `便座（${selectedData.vSeatName}）`, price: selectedData.vSeatPrice });
            }

            productList.push({ name: `排水芯部品（${selectedData.drainParts}）`, price: selectedData.partsCost });

            const grandTotal = totalProduct + totalWork;

            // PDF用HTML生成
            const pdfContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { font-family: 'Yu Gothic', sans-serif; padding: 40px; }
                        .header { text-align: center; margin-bottom: 40px; }
                        .title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
                        .customer { margin-bottom: 30px; }
                        .customer-line { margin: 8px 0; font-size: 14px; }
                        .section { margin: 30px 0; }
                        .section-title { 
                            background: #667eea; 
                            color: white; 
                            padding: 10px; 
                            font-weight: bold; 
                            margin-bottom: 15px;
                        }
                        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                        th, td { 
                            border: 1px solid #ddd; 
                            padding: 12px; 
                            text-align: left;
                        }
                        th { background: #f5f5f5; font-weight: bold; }
                        .right { text-align: right; }
                        .total-section { margin-top: 20px; }
                        .total-row { 
                            display: flex; 
                            justify-content: space-between; 
                            padding: 12px; 
                            border-bottom: 1px solid #ddd;
                        }
                        .total-row.grand { 
                            border-top: 3px solid #333; 
                            padding-top: 15px;
                            font-size: 20px; 
                            font-weight: bold; 
                            background: #e3f2fd;
                            color: #1976d2;
                        }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="title">お見積書</div>
                    </div>

                    <div class="customer">
                        <div class="customer-line">${customerName} 様</div>
                        <div class="customer-line">作成日：${new Date().toLocaleDateString('ja-JP')}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">商品明細</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>商品名</th>
                                    <th class="right">金額</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${productList.map(item => `
                                    <tr>
                                        <td>${item.name}</td>
                                        <td class="right">¥${item.price.toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                                <tr style="background: #f5f5f5; font-weight: bold;">
                                    <td>商品代 小計</td>
                                    <td class="right">¥${totalProduct.toLocaleString()}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="section">
                        <div class="section-title">工事費明細</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>工事内容</th>
                                    <th class="right">金額</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${workList.map(work => `
                                    <tr>
                                        <td>${work.name}</td>
                                        <td class="right">¥${work.price.toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                                <tr style="background: #f5f5f5; font-weight: bold;">
                                    <td>工事費 小計</td>
                                    <td class="right">¥${totalWork.toLocaleString()}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="section">
                        <div class="total-section">
                            <div class="total-row grand">
                                <span>合計金額（税込）</span>
                                <span>¥${grandTotal.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 50px; font-size: 11px; color: #666; text-align: center;">
                        本見積書は ${new Date().toLocaleDateString('ja-JP')} に作成されました
                    </div>
                </body>
                </html>
            `;

            // PDF生成
            const element = document.createElement('div');
            element.innerHTML = pdfContent;
            
            const opt = {
                margin: 10,
                filename: `アラウーノ見積書_${customerName}_${new Date().toLocaleDateString('ja-JP').replace(/\//g, '')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
