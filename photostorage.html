<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォト保管庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f3ef;padding:1rem}
.wrap{max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:700;color:#1e3a5f;margin-bottom:1rem}
.panel{background:#fff;border-radius:12px;padding:1.2rem;margin-bottom:1rem;border:1px solid #e0ddd8}
label{font-size:12px;color:#888;display:block;margin-bottom:4px}
select,input[type=text]{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid #ddd;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
select:focus,input[type=text]:focus{border-color:#1e3a5f}
.extra{display:none;background:#eef4ff;border-radius:8px;padding:10px;margin-bottom:12px}
.extra.show{display:block}
.pick{border:2px dashed #ccc;border-radius:10px;text-align:center;padding:1.5rem;cursor:pointer;position:relative;margin-bottom:12px}
.pick:hover{border-color:#1e3a5f;background:#f0f4fb}
.pick input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid #ddd}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb button{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:11px;cursor:pointer;line-height:18px}
.send{width:100%;padding:13px;background:#1e3a5f;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.send:disabled{background:#aaa;cursor:not-allowed}
.progress{display:none;margin-bottom:12px;font-size:13px;color:#555;text-align:center}
.progress.show{display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2d6a4f;color:#fff;padding:10px 22px;border-radius:999px;font-size:14px;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <h1>📷 フォト保管庫</h1>

  <div class="panel">
    <label>カテゴリー</label>
    <select id="cat" onchange="onCat()">
      <option>フェア</option>
      <option>工事</option>
      <option>点検</option>
      <option>プライベート</option>
    </select>

    <label>タイトル（任意）</label>
    <input type="text" id="title" placeholder="例：春のフェア">

    <div class="extra" id="extra">
      <label>顧客名</label>
      <input type="text" id="customer" placeholder="例：山田様">
      <label>商品名</label>
      <input type="text" id="product" placeholder="例：エアコン CS-X253D">
    </div>

    <div class="pick">
      <div>🖼️<br><span style="font-size:14px;color:#666">タップして写真を選ぶ（複数可）</span></div>
      <input type="file" id="file-in" accept="image/*" multiple onchange="onPick(this)">
    </div>

    <div class="thumbs" id="thumbs"></div>
    <div id="count" style="font-size:12px;color:#888;margin-bottom:10px"></div>

    <div class="progress" id="progress">アップロード中...</div>

    <button class="send" id="send-btn" onclick="upload()" disabled>
      ☁️ ドライブに保存する
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ★ ここにGASのURLを貼る
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx0W8SrtiW4P_x6gSU5JeTKpgCnmQCXhLniIl_zsl7IyLVOhLS3kVdxUfx8t1RryJcI/exec';

let files = [], datas = [];

function onCat() {
  const c = document.getElementById('cat').value;
  document.getElementById('extra').className = 'extra' + (c==='工事'||c==='点検' ? ' show' : '');
}

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function buildName(origName, idx) {
  const cat   = document.getElementById('cat').value;
  const title = document.getElementById('title').value.trim();
  const cust  = document.getElementById('customer').value.trim();
  const prod  = document.getElementById('product').value.trim();
  const ext   = (origName.match(/\.[^.]+$/) || ['.jpg'])[0];
  const parts = [dateStr(), cat];
  if (cust)  parts.push(cust);
  if (prod)  parts.push(prod);
  if (title) parts.push(title);
  if (files.length > 1) parts.push(String(idx+1).padStart(2,'0'));
  return parts.join('_') + ext;
}

function readFile(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

function compress(dataURL, maxPx=1200) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const r = Math.min(maxPx/img.width, maxPx/img.height, 1);
      c.width = img.width*r; c.height = img.height*r;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataURL;
  });
}

async function onPick(input) {
  const picked = Array.from(input.files).filter(f => f.type.startsWith('image/'));
  input.value = '';
  for (const f of picked) {
    files.push(f);
    datas.push(await readFile(f));
  }
  renderThumbs();
}

function renderThumbs() {
  document.getElementById('thumbs').innerHTML = files.map((f, i) =>
    `<div class="thumb"><img src="${datas[i]}"><button onclick="remove(${i})">×</button></div>`
  ).join('');
  document.getElementById('count').textContent = files.length ? `${files.length}枚 選択中` : '';
  document.getElementById('send-btn').disabled = files.length === 0;
}

function remove(i) {
  files.splice(i, 1); datas.splice(i, 1);
  renderThumbs();
}

async function upload() {
  if (!files.length) return;
  const btn = document.getElementById('send-btn');
  const prog = document.getElementById('progress');
  btn.disabled = true;
  prog.className = 'progress show';

  for (let i = 0; i < files.length; i++) {
    prog.textContent = `${i+1} / ${files.length} 枚 送信中...`;
    const compressed = await compress(datas[i]);
    const filename = buildName(files[i].name, i);

    // FormDataで送信
    const fd = new FormData();
    fd.append('filename', filename);
    fd.append('data', compressed);

    try {
      await fetch(GAS_URL, { method: 'POST', body: fd });
    } catch(e) {
      console.error(e);
    }
  }

  prog.className = 'progress';
  files = []; datas = [];
  renderThumbs();
  document.getElementById('title').value = '';
  document.getElementById('customer').value = '';
  document.getElementById('product').value = '';
  showToast(`✅ ${files.length || ''}送信しました！ドライブを確認してください`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
</body>
</html>
