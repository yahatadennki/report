<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォト保管庫 - ヤハタ電機商会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#f5f3ef;min-height:100vh;color:#1a1a1a}
.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.header{background:#1e3a5f;color:#fff;border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:19px;font-weight:700}
.header p{font-size:12px;opacity:.65;margin-top:2px}
.drive-link{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#1a73e8;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:500;text-decoration:none;white-space:nowrap}
.drive-link:hover{background:#e8f0fe}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.2rem}
.sc{background:#fff;border-radius:10px;padding:10px 14px;min-width:78px;text-align:center;border:1px solid #e8e4de}
.sc .n{font-size:20px;font-weight:700;color:#1e3a5f}
.sc .l{font-size:11px;color:#999;margin-top:2px}
.panel{background:#fff;border-radius:14px;padding:1.4rem;margin-bottom:1.2rem;border:1px solid #e8e4de}
.panel-ttl{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:14px}
.frow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.fg label{font-size:11px;color:#888;font-weight:500}
.fg select,.fg input[type=text]{padding:9px 11px;border-radius:8px;border:1.5px solid #ddd;font-size:14px;font-family:inherit;outline:none;background:#fff;transition:border-color .15s;width:100%}
.fg select:focus,.fg input[type=text]:focus{border-color:#1e3a5f}
.extra{display:none;background:#eef4ff;border:1px solid #c5d9f5;border-radius:10px;padding:12px;margin-bottom:12px}
.extra.show{display:block}
.extra-ttl{font-size:11px;color:#1a73e8;font-weight:700;margin-bottom:8px}
.pick-wrap{position:relative;border:2px dashed #ccc;border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;overflow:hidden}
.pick-wrap:hover{border-color:#1e3a5f;background:#f0f4fb}
.pick-inner{padding:1.5rem 1rem;pointer-events:none}
.pick-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pick-ico{font-size:30px;margin-bottom:8px}
.pick-wrap p{font-size:14px;color:#666}
.pick-wrap small{font-size:11px;color:#bbb;margin-top:4px;display:block}
.thumb-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.thumb-item{position:relative;width:78px;height:78px;border-radius:8px;overflow:hidden;border:1.5px solid #ddd;flex-shrink:0}
.thumb-item img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#fff;font-size:12px;line-height:18px;text-align:center;padding:0}
.thumb-lbl{font-size:12px;color:#777;margin-bottom:12px}
.fn-preview{background:#f0f4fb;border-radius:7px;padding:7px 11px;font-size:12px;color:#1e3a5f;margin-bottom:14px;display:none;word-break:break-all}
.fn-preview b{font-weight:700}
.progress-wrap{display:none;margin-bottom:14px}
.progress-wrap.show{display:block}
.progress-bar-bg{background:#e0e0e0;border-radius:999px;height:8px;overflow:hidden}
.progress-bar{background:#1e3a5f;height:8px;border-radius:999px;width:0%;transition:width .3s}
.progress-lbl{font-size:12px;color:#666;margin-top:5px;text-align:center}
.send-btn{width:100%;padding:14px;border-radius:10px;background:#1e3a5f;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:hover:not(:disabled){background:#2a4f7c}
.send-btn:disabled{background:#b0b8c4;cursor:not-allowed}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{padding:6px 14px;border-radius:999px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap}
.fbtn.active{border-color:#1e3a5f;background:#1e3a5f;color:#fff}
.fbtn:not(.active):hover{border-color:#1e3a5f;color:#1e3a5f}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.card{background:#fff;border-radius:11px;overflow:hidden;border:1.5px solid #e8e4de;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;display:block}
.card-body{padding:8px 10px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;color:#fff}
.card-acts{display:flex;gap:2px}
.ic{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ic:hover{background:#f0f0f0}
.card-sub{font-size:11px;color:#555;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub2{font-size:11px;color:#999;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#2d6a4f;background:#e6f4ed;border-radius:4px;padding:2px 6px;margin-top:3px}
.fn-chip{font-size:10px;color:#bbb;background:#f5f3ef;border-radius:4px;padding:2px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;display:block}
.empty{text-align:center;color:#ccc;padding:3rem;font-size:14px}
.empty .big{font-size:40px;margin-bottom:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;overflow:hidden;max-width:92vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee;gap:8px;flex-wrap:wrap}
.modal-title{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.modal-acts{display:flex;gap:6px;align-items:center;flex-shrink:0}
.modal-img-wrap{overflow:auto;display:flex;align-items:center;justify-content:center;padding:8px}
.modal-img{max-width:82vw;max-height:66vh;object-fit:contain;display:block}
.modal-ft{padding:8px 16px;border-top:1px solid #eee;font-size:11px;color:#aaa;word-break:break-all}
.close-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;display:flex}
.close-btn:hover{background:#f0f0f0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:500;display:none;z-index:300;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{display:block}
.toast.ok{background:#2d6a4f}
.toast.err{background:#c0392b}
@media(max-width:600px){
  .header{padding:1rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>📷 フォト保管庫</h1>
      <p>ヤハタ電機商会</p>
    </div>
    <a href="https://drive.google.com/drive/u/0/folders/12WLokXXTwYKgdrGgQLQImKpdAmHoeCRJ" target="_blank" class="drive-link">
      <svg width="15" height="15" viewBox="0 0 87.3 78" fill="none"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 49.5C.4 50.9 0 52.45 0 54h27.5z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.85l5.85 11.2z" fill="#ea4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="M59.85 54H27.5L13.75 77.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="M73.4 27.5l-12.6-21.8c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.85 54h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
      保存先フォルダを開く
    </a>
  </div>

  <div class="stats" id="stats">
    <div class="sc"><div class="n" id="total-n">0</div><div class="l">総枚数</div></div>
  </div>

  <div class="panel">
    <div class="panel-ttl">📋 写真を登録</div>
    <div class="frow">
      <div class="fg">
        <label>カテゴリー</label>
        <select id="cat" onchange="onCatChange()">
          <option value="フェア">フェア</option>
          <option value="工事">工事</option>
          <option value="点検">点検</option>
          <option value="プライベート">プライベート</option>
        </select>
      </div>
      <div class="fg">
        <label>タイトル（任意）</label>
        <input type="text" id="name-in" placeholder="例：春のフェア" oninput="updatePreview()">
      </div>
    </div>

    <div class="extra" id="extra">
      <div class="extra-ttl">🏠 顧客・商品情報</div>
      <div class="frow" style="margin-bottom:0">
        <div class="fg">
          <label>顧客名</label>
          <input type="text" id="customer" placeholder="例：山田様" oninput="updatePreview()">
        </div>
        <div class="fg">
          <label>商品名</label>
          <input type="text" id="product" placeholder="例：エアコン CS-X253D" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <div class="fn-preview" id="fn-preview">📄 保存ファイル名：<b id="fn-text"></b></div>

    <div class="pick-wrap">
      <div class="pick-inner">
        <div class="pick-ico">🖼️</div>
        <p>タップして写真を選ぶ</p>
        <small>複数枚まとめて選択できます</small>
      </div>
      <input type="file" id="file-in" accept="image/*" multiple onchange="onFilePick(this)">
    </div>

    <div class="thumb-bar" id="thumb-bar"></div>
    <div class="thumb-lbl" id="thumb-lbl"></div>

    <div class="progress-wrap" id="pw">
      <div class="progress-bar-bg"><div class="progress-bar" id="pb"></div></div>
      <div class="progress-lbl" id="pl">アップロード中...</div>
    </div>

    <button class="send-btn" id="send-btn" onclick="register()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      ドライブに保存する
    </button>
  </div>

  <div class="filters">
    <button class="fbtn active" onclick="setFilter('すべて',this)">すべて <span id="f-all">(0)</span></button>
    <button class="fbtn" onclick="setFilter('フェア',this)">フェア <span id="f-0">(0)</span></button>
    <button class="fbtn" onclick="setFilter('工事',this)">工事 <span id="f-1">(0)</span></button>
    <button class="fbtn" onclick="setFilter('点検',this)">点検 <span id="f-2">(0)</span></button>
    <button class="fbtn" onclick="setFilter('プライベート',this)">プライベート <span id="f-3">(0)</span></button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"><div class="big">🖼️</div>写真がまだありません</div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">
        <span class="pill" id="m-cat"></span>
        <span style="font-size:13px;color:#555;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="m-name"></span>
      </div>
      <div class="modal-acts">
        <button class="close-btn" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-img-wrap"><img class="modal-img" id="m-img" src="" alt=""></div>
    <div class="modal-ft" id="m-ft"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ★ GAS URL
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQElStGimIfhMUbtGUT2ARCZpjMu9lg4INzIFcsU4cICSxTlcglA7Nucn22mVpEwIl/exec';

const CATS = ['フェア','工事','点検','プライベート'];
const COLORS = {フェア:'#c75b1a',工事:'#2d6a4f',点検:'#1e3a5f',プライベート:'#6b3a8e'};
const FID = {フェア:'f-0',工事:'f-1',点検:'f-2',プライベート:'f-3'};
const KEY = 'yahata_photos_v3';

let photos=[], pendingFiles=[], pendingData=[];
let currentFilter='すべて', currentModal=null;

function toDateStr(d=new Date()){
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function toDisp(d=new Date()){
  return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
}
function buildFn(cat,name,customer,product,origName,idx,total){
  const ext=(origName.match(/\.[^.]+$/)||['.jpg'])[0];
  const parts=[toDateStr(),cat];
  if(customer) parts.push(customer);
  if(product) parts.push(product);
  if(name) parts.push(name);
  if(total>1) parts.push(String(idx+1).padStart(2,'0'));
  return parts.join('_')+ext;
}
function saveLS(){try{localStorage.setItem(KEY,JSON.stringify(photos));}catch(e){}}
function loadLS(){try{const d=localStorage.getItem(KEY);if(d)photos=JSON.parse(d);}catch(e){}}

function compress(dataURL, maxPx=1200){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const r=Math.min(maxPx/img.width, maxPx/img.height, 1);
      c.width=img.width*r; c.height=img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg', 0.85));
    };
    img.src=dataURL;
  });
}
function compressThumb(dataURL){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const r=Math.min(400/img.width, 400/img.height, 1);
      c.width=img.width*r; c.height=img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg', 0.75));
    };
    img.src=dataURL;
  });
}
function readFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result); r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ★ no-cors で送信 → レスポンスは読めないが送信は通る
async function uploadToGas(filename, dataURL){
  const body = JSON.stringify({ files:[{ filename, data: dataURL }] });
  await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',       // ← CORSをスキップ
    body: body
  });
  // no-cors はレスポンスが空なので、エラーが投げられなければ成功とみなす
}

function onCatChange(){
  const cat=document.getElementById('cat').value;
  (cat==='工事'||cat==='点検')
    ? document.getElementById('extra').classList.add('show')
    : document.getElementById('extra').classList.remove('show');
  updatePreview();
}
function updatePreview(){
  const cat=document.getElementById('cat').value;
  const name=document.getElementById('name-in').value.trim();
  const customer=document.getElementById('customer').value.trim();
  const product=document.getElementById('product').value.trim();
  const preview=document.getElementById('fn-preview');
  if(pendingFiles.length||name||customer||product){
    const sample=pendingFiles.length?pendingFiles[0].name:'photo.jpg';
    let txt=buildFn(cat,name,customer,product,sample,0,pendingFiles.length||1);
    if(pendingFiles.length>1) txt+=` ほか${pendingFiles.length-1}枚`;
    document.getElementById('fn-text').textContent=txt;
    preview.style.display='block';
  } else {
    preview.style.display='none';
  }
}

async function onFilePick(input){
  const files=Array.from(input.files).filter(f=>f.type.startsWith('image/'));
  input.value='';
  if(!files.length) return;
  for(const f of files){
    const data=await readFile(f);
    pendingFiles.push(f);
    pendingData.push(data);
  }
  renderThumbs();
  updatePreview();
  document.getElementById('send-btn').disabled=false;
}
function renderThumbs(){
  document.getElementById('thumb-bar').innerHTML=
    pendingFiles.map((_,i)=>`<div class="thumb-item"><img src="${pendingData[i]}" alt=""><button class="thumb-del" onclick="removePending(${i})">×</button></div>`).join('');
  document.getElementById('thumb-lbl').textContent=pendingFiles.length?`${pendingFiles.length}枚 選択中`:'';
  document.getElementById('send-btn').disabled=!pendingFiles.length;
}
function removePending(i){
  pendingFiles.splice(i,1); pendingData.splice(i,1);
  renderThumbs(); updatePreview();
}

async function register(){
  if(!pendingFiles.length) return;
  const btn=document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='送信中...';

  const cat=document.getElementById('cat').value;
  const name=document.getElementById('name-in').value.trim();
  const customer=document.getElementById('customer').value.trim();
  const product=document.getElementById('product').value.trim();
  const total=pendingFiles.length;

  document.getElementById('pw').classList.add('show');
  const pb=document.getElementById('pb');
  const pl=document.getElementById('pl');

  const newPhotos=[];
  for(let i=0;i<total;i++){
    pl.textContent=`${i+1} / ${total} 枚 アップロード中...`;
    pb.style.width=`${Math.round(i/total*100)}%`;

    const file=pendingFiles[i];
    const filename=buildFn(cat,name,customer,product,file.name,i,total);
    const compressed=await compress(pendingData[i], 1200);
    const thumb=await compressThumb(pendingData[i]);

    try {
      await uploadToGas(filename, compressed);
      newPhotos.push({
        id:`${Date.now()}-${Math.random().toString(36).slice(2)}`,
        origName:file.name, filename, name, customer, product,
        category:cat, date:toDisp(), dateStr:toDateStr(),
        thumb, uploaded:true
      });
    } catch(err) {
      console.error(err);
      newPhotos.push({
        id:`${Date.now()}-${Math.random().toString(36).slice(2)}`,
        origName:file.name, filename, name, customer, product,
        category:cat, date:toDisp(), dateStr:toDateStr(),
        thumb, uploaded:false
      });
    }
  }

  pb.style.width='100%';
  pl.textContent='完了！';
  setTimeout(()=>document.getElementById('pw').classList.remove('show'), 1500);

  photos=[...newPhotos,...photos];
  saveLS();
  pendingFiles=[]; pendingData=[];
  renderThumbs();
  document.getElementById('name-in').value='';
  document.getElementById('customer').value='';
  document.getElementById('product').value='';
  document.getElementById('fn-preview').style.display='none';
  btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> ドライブに保存する';
  btn.disabled=true;
  renderAll();
  showToast(`✅ ${total}枚をドライブに送信しました！`,'ok');
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function setFilter(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function renderAll(){ renderStats(); renderGrid(); }
function renderStats(){
  document.getElementById('total-n').textContent=photos.length;
  const stats=document.getElementById('stats');
  stats.querySelectorAll('.sc.cat').forEach(e=>e.remove());
  CATS.forEach(c=>{
    const cnt=photos.filter(p=>p.category===c).length;
    const fi=document.getElementById(FID[c]);
    if(fi) fi.textContent=`(${cnt})`;
    if(cnt>0){
      const d=document.createElement('div');
      d.className='sc cat';
      d.innerHTML=`<div class="n" style="color:${COLORS[c]}">${cnt}</div><div class="l">${c}</div>`;
      stats.appendChild(d);
    }
  });
  document.getElementById('f-all').textContent=`(${photos.length})`;
}
function renderGrid(){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const list=currentFilter==='すべて'?photos:photos.filter(p=>p.category===currentFilter);
  if(!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(p=>{
    const sub=[p.customer,p.product].filter(Boolean).join(' / ');
    return `<div class="card">
      <img src="${p.thumb}" loading="lazy" onclick="openModal('${p.id}')" alt="">
      <div class="card-body">
        <div class="card-top">
          <span class="pill" style="background:${COLORS[p.category]||'#555'}">${p.category}</span>
          <div class="card-acts">
            <button class="ic" onclick="delPhoto('${p.id}')" title="削除">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#cc3333" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6"/></svg>
            </button>
          </div>
        </div>
        ${p.name?`<div class="card-sub">${p.name}</div>`:''}
        ${sub?`<div class="card-sub2">${sub}</div>`:''}
        <div class="card-sub2">${p.date}</div>
        ${p.uploaded
          ?`<div class="saved-badge">☁️ ドライブ保存済</div>`
          :`<span class="fn-chip">${p.filename}</span>`}
      </div>
    </div>`;
  }).join('');
}
function delPhoto(id){
  if(!confirm('この写真を削除しますか？\n※ドライブ上のファイルは削除されません'))return;
  photos=photos.filter(p=>p.id!==id);
  if(currentModal===id) closeModal();
  saveLS(); renderAll();
}
function openModal(id){
  currentModal=id;
  const p=photos.find(x=>x.id===id);
  const sub=[p.customer,p.product].filter(Boolean).join(' / ');
  document.getElementById('m-cat').textContent=p.category;
  document.getElementById('m-cat').style.background=COLORS[p.category]||'#555';
  document.getElementById('m-name').textContent=[p.name,sub].filter(Boolean).join('　');
  document.getElementById('m-img').src=p.thumb;
  document.getElementById('m-ft').textContent=`${p.date}　${p.uploaded?'☁️ ドライブ保存済　':''}${p.filename}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

loadLS();
renderAll();
</script>
</body>
</html>
