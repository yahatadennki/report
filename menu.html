<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>㈲ヤハタ電機商会 業務ポータル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef1f5; min-height: 100vh; padding: 20px 16px 40px; }
    .container { max-width: 560px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 28px; padding-top: 8px; }
    .header h1 { color: #1a3c5e; font-size: 22px; font-weight: bold; }
    .header p { color: #999; font-size: 12px; margin-top: 4px; }
    .section-label {
      font-size: 11px; font-weight: bold; color: #6b7280;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding-left: 10px; border-left: 3px solid #3b82f6;
      margin-bottom: 12px; margin-top: 28px;
    }
    .card-list { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: white; border-radius: 14px; padding: 16px 18px;
      text-decoration: none; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      border: 2px solid transparent; transition: all 0.18s;
    }
    .card:active { transform: scale(0.98); }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.13); transform: translateY(-1px); }
    .icon { font-size: 30px; width: 44px; text-align: center; flex-shrink: 0; }
    .body { flex: 1; min-width: 0; }
    .card-title { font-weight: bold; font-size: 15px; color: #1e293b; }
    .card-desc { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .arrow { color: #cbd5e1; font-size: 18px; flex-shrink: 0; }

    .app-himawari { border-color: #fde68a; }
    .app-himawari:hover { border-color: #f59e0b; }
    .app-juchu { border-color: #a7f3d0; }
    .app-juchu:hover { border-color: #10b981; }
    .app-kouji { border-color: #bfdbfe; }
    .app-kouji:hover { border-color: #3b82f6; }
    .app-mitsumori { border-color: #fce7f3; }
    .app-mitsumori:hover { border-color: #ec4899; }
    .sheet-mitsumori { border-color: #fce7f3; }
    .sheet-mitsumori:hover { border-color: #ec4899; }
    .tag-mitsumori { background: #fce7f3; color: #9d174d; }

    .sheet-juchu { border-color: #d1fae5; }
    .sheet-juchu:hover { border-color: #059669; }
    .tag-juchu { background: #d1fae5; color: #065f46; }
    .sheet-kouji { border-color: #dbeafe; }
    .sheet-kouji:hover { border-color: #2563eb; }
    .tag-kouji { background: #dbeafe; color: #1e3a8a; }
    .tag-staff { background: #f3e8ff; color: #6b21a8; }
    .tag-other { background: #f1f5f9; color: #475569; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>🌻 ヤハタ電機商会</h1>
      <p>業務ポータル</p>
    </div>

    <div class="section-label">📱 アプリ</div>
    <div class="card-list">

      <a class="card app-himawari" href="https://yahatadennki.github.io/report/index.html" target="_blank">
        <div class="icon">🌻</div>
        <div class="body">
          <div class="card-title">ひまわりスタッフ日報</div>
          <div class="card-desc">石橋・角井・櫻井 ／ 区域・面談・TEL・ポスティング</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card app-juchu" href="https://yahatadennki.github.io/report/juchu.html" target="_blank">
        <div class="icon">📋</div>
        <div class="body">
          <div class="card-title">受注日報</div>
          <div class="card-desc">受注・見積・訪問履歴の記録</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card app-kouji" href="https://yahatadennki.github.io/report/kouji.html" target="_blank">
        <div class="icon">🔧</div>
        <div class="body">
          <div class="card-title">業務日報</div>
          <div class="card-desc">高山・渡辺・伊藤・服部 ／ 工事・配達・修理・現調</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card app-mitsumori" href="https://script.google.com/macros/s/AKfycbyItc-NVaxnfysND_SA1l9h11svhMAFToa-b89JofY_mUlAVgz7AnQOquQoQv1KzXucTw/exec" target="_blank">
        <div class="icon">💴</div>
        <div class="body">
          <div class="card-title">見積アプリ</div>
          <div class="card-desc">見積書の作成・管理</div>
        </div>
        <div class="arrow">›</div>
      </a>

    </div>

    <div class="section-label">📊 スプレッドシート</div>
    <div class="card-list">

      <a class="card app-himawari" href="https://docs.google.com/spreadsheets/d/1WMsviRURr3Lwfi4zy4-dvH7DHO3uq4WXb4NBScwLqi4/edit" target="_blank">
        <div class="icon">🌻</div>
        <div class="body">
          <div class="card-title">ひまわりスタッフ日報シート</div>
          <div class="tags">
            <span class="tag tag-other">石橋</span>
            <span class="tag tag-other">角井</span>
            <span class="tag tag-other">櫻井</span>
          </div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card sheet-juchu" href="https://docs.google.com/spreadsheets/d/1Cg5FACS_HqpAlchsU6O4ansNHc7GO_FOWAYhpX_72_w/edit" target="_blank">
        <div class="icon">📋</div>
        <div class="body">
          <div class="card-title">受注日報シート</div>
          <div class="tags">
            <span class="tag tag-juchu">受注日報</span>
          </div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card sheet-kouji" href="https://docs.google.com/spreadsheets/d/1L57wd6u7MaX0Nw4SdpPtbCgVEbtLJkx6Pa1dvJpeZqg/edit" target="_blank">
        <div class="icon">📊</div>
        <div class="body">
          <div class="card-title">業務日報シート</div>
          <div class="tags">
            <span class="tag tag-kouji">日報</span>
            <span class="tag tag-staff">高山</span>
            <span class="tag tag-staff">渡辺</span>
            <span class="tag tag-staff">伊藤</span>
            <span class="tag tag-staff">服部</span>
            <span class="tag tag-other">見込み商品</span>
            <span class="tag tag-other">顧客マスタ</span>
          </div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card sheet-mitsumori" href="https://docs.google.com/spreadsheets/d/1_SUa8xeosaqcnJgx-Sd_XIPEQ1aEm8HPPoC5H45OX68/edit" target="_blank">
        <div class="icon">💴</div>
        <div class="body">
          <div class="card-title">見積書シート</div>
          <div class="tags">
            <span class="tag tag-mitsumori">見積書</span>
          </div>
        </div>
        <div class="arrow">›</div>
      </a>

    </div>

  </div>
</body>
</html>
