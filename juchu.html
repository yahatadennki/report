<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受注日報 - ヤハタ電機商会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .date-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        .settings-btn {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .settings-btn:hover {
            background: #7f8c8d;
        }

        .settings-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .settings-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .orders-list {
            margin-top: 30px;
        }

        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .orders-header h2 {
            color: #333;
            font-size: 20px;
        }

        .order-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .order-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            position: relative;
        }

        .order-card.type-電話 {
            border-left-color: #3498db;
        }

        .order-card.type-来店 {
            border-left-color: #2ecc71;
        }

        .order-card.type-訪問 {
            border-left-color: #9b59b6;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .order-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .order-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .order-badge.type-電話 {
            background: #e3f2fd;
            color: #1976d2;
        }

        .order-badge.type-来店 {
            background: #e8f5e9;
            color: #388e3c;
        }

        .order-badge.type-訪問 {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .order-info {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .order-info p {
            margin: 5px 0;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .sync-status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }

        .sync-status.success {
            background: #d4edda;
            color: #155724;
        }

        .sync-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .type-select {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .type-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .type-option:hover {
            border-color: #667eea;
        }

        .type-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 受注日報</h1>
            <p>㈲ヤハタ電機商会</p>
        </div>

        <button class="settings-btn" onclick="toggleSettings()">⚙️ 設定</button>

        <div id="settingsPanel" class="settings-panel">
            <div class="form-group">
                <label>Google Apps Script URL</label>
                <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">保存</button>
            <div id="syncStatus"></div>
        </div>

        <div class="date-display" id="currentDate"></div>

        <form id="orderForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label>担当<span class="required">*</span></label>
                <select id="staff" required>
                    <option value="">選択してください</option>
                    <option value="宇留野">宇留野</option>
                    <option value="石橋">石橋</option>
                    <option value="角井">角井</option>
                    <option value="櫻井">櫻井</option>
                    <option value="渡邊">渡邊</option>
                    <option value="伊藤">伊藤</option>
                    <option value="高山">高山</option>
                </select>
            </div>

            <div class="form-group">
                <label>種類<span class="required">*</span></label>
                <input type="hidden" id="type" required>
                <div class="type-select">
                    <div class="type-option" onclick="selectType('電話')">📞 電話</div>
                    <div class="type-option" onclick="selectType('来店')">🏢 来店</div>
                    <div class="type-option" onclick="selectType('訪問')">🚗 訪問</div>
                </div>
            </div>

            <div class="form-group">
                <label>顧客名<span class="required">*</span></label>
                <input type="text" id="customerName" required>
            </div>

            <div class="form-group">
                <label>電話番号</label>
                <input type="tel" id="phone" placeholder="例: 043-123-4567">
            </div>

            <div class="form-group">
                <label>住所</label>
                <input type="text" id="address" placeholder="例: 長沼町">
            </div>

            <div class="form-group">
                <label>訪問日時</label>
                <input type="datetime-local" id="visitDateTime">
            </div>

            <div class="form-group">
                <label>受注内容<span class="required">*</span></label>
                <textarea id="content" required placeholder="受注内容を入力"></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">➕ 受注を追加</button>
                <button type="button" class="btn btn-secondary" onclick="clearForm()">🔄 クリア</button>
            </div>
        </form>

        <div class="orders-list">
            <div class="orders-header">
                <h2>📊 本日の受注</h2>
                <span class="order-count" id="orderCount">0件</span>
            </div>
            <div id="ordersList"></div>
        </div>
    </div>

    <script>
        let orders = [];

        // 現在の日付を表示
        function updateDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('ja-JP', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('currentDate').textContent = dateStr;
        }

        // 種類を選択
        function selectType(type) {
            document.getElementById('type').value = type;
            const options = document.querySelectorAll('.type-option');
            options.forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // 設定パネルの表示切替
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                const savedUrl = localStorage.getItem('scriptUrl') || '';
                document.getElementById('scriptUrl').value = savedUrl;
            }
        }

        // 設定を保存
        function saveSettings() {
            const url = document.getElementById('scriptUrl').value;
            localStorage.setItem('scriptUrl', url);
            showSyncStatus('設定を保存しました', 'success');
            setTimeout(() => {
                document.getElementById('settingsPanel').classList.remove('active');
            }, 1500);
        }

        // 同期ステータスを表示
        function showSyncStatus(message, type) {
            const status = document.getElementById('syncStatus');
            status.textContent = message;
            status.className = 'sync-status ' + type;
            setTimeout(() => {
                status.textContent = '';
                status.className = 'sync-status';
            }, 3000);
        }

        // Google Spreadsheetに送信
        async function sendToSpreadsheet(order) {
            const url = localStorage.getItem('scriptUrl');
            if (!url) {
                alert('スプレッドシートURLを設定してください');
                return;
            }

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        日付: order.date,
                        登録時刻: order.time,
                        担当: order.staff,
                        種類: order.type,
                        顧客名: order.customerName,
                        電話番号: order.phone || '',
                        住所: order.address || '',
                        訪問日時: order.visitDateTime || '',
                        内容: order.content
                    })
                });
                console.log('スプレッドシートに送信しました');
            } catch (error) {
                console.error('送信エラー:', error);
            }
        }

        // フォーム送信
        async function handleSubmit(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            if (!type) {
                alert('種類を選択してください');
                return;
            }

            const now = new Date();
            const order = {
                id: Date.now(),
                date: now.toLocaleDateString('ja-JP'),
                time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
                staff: document.getElementById('staff').value,
                type: type,
                customerName: document.getElementById('customerName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                visitDateTime: document.getElementById('visitDateTime').value,
                content: document.getElementById('content').value
            };

            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            renderOrders();
            clearForm();

            // Google Spreadsheetに送信
            await sendToSpreadsheet(order);
        }

        // 受注を表示
        function renderOrders() {
            const container = document.getElementById('ordersList');
            const count = document.getElementById('orderCount');

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state">まだ受注が登録されていません</div>';
                count.textContent = '0件';
                return;
            }

            count.textContent = orders.length + '件';
            container.innerHTML = orders.map(order => {
                const visitDateTimeStr = order.visitDateTime ? 
                    new Date(order.visitDateTime).toLocaleString('ja-JP') : '';
                
                return `
                    <div class="order-card type-${order.type}">
                        <button class="delete-btn" onclick="deleteOrder(${order.id})">🗑️ 削除</button>
                        <div class="order-header">
                            <div class="order-title">${order.customerName}</div>
                            <span class="order-badge type-${order.type}">${order.type}</span>
                        </div>
                        <div class="order-info">
                            <p><strong>担当:</strong> ${order.staff}</p>
                            ${order.phone ? '<p><strong>電話:</strong> ' + order.phone + '</p>' : ''}
                            ${order.address ? '<p><strong>住所:</strong> ' + order.address + '</p>' : ''}
                            ${visitDateTimeStr ? '<p><strong>訪問日時:</strong> ' + visitDateTimeStr + '</p>' : ''}
                            <p><strong>内容:</strong> ${order.content}</p>
                            <p style="font-size: 12px; color: #999; margin-top: 8px;">登録: ${order.date} ${order.time}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 受注を削除
        function deleteOrder(id) {
            if (confirm('この受注を削除してもよろしいですか?')) {
                orders = orders.filter(order => order.id !== id);
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        // フォームをクリア
        function clearForm() {
            document.getElementById('orderForm').reset();
            document.getElementById('type').value = '';
            const options = document.querySelectorAll('.type-option');
            options.forEach(opt => opt.classList.remove('selected'));
        }

        // ローカルストレージから受注を読み込み
        function loadOrders() {
            const saved = localStorage.getItem('orders');
            if (saved) {
                orders = JSON.parse(saved);
                renderOrders();
            }
        }

        // 初期化
        updateDate();
        loadOrders();
    </script>
</body>
</html>
