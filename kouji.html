<!-- PIN認証オーバーレイ -->
<div id="pinOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a3c5e,#2d6a9f);z-index:9999;display:flex;align-items:center;justify-content:center;">

    <div style="font-size:48px;margin-bottom:8px;">📋</div>
    <div style="font-size:18px;font-weight:bold;color:#1a3c5e;margin-bottom:4px;">㈲ヤハタ電機商会</div>
    <div style="font-size:13px;color:#888;margin-bottom:28px;">業務日報</div>
    <div style="font-size:13px;font-weight:bold;color:#555;margin-bottom:10px;">PINコードを入力してください</div>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off"
      style="width:100%;padding:14px;font-size:28px;letter-spacing:12px;text-align:center;border:2px solid #ddd;border-radius:12px;outline:none;margin-bottom:16px;"
      placeholder="● ● ● ●"
      onfocus="this.style.borderColor='#f97316'"
      onblur="this.style.borderColor='#ddd'"
      onkeydown="if(event.key==='Enter')verifyPin()">
    <div id="pinError" style="color:#dc2626;font-size:13px;margin-bottom:12px;min-height:18px;"></div>
    <button onclick="verifyPin()" style="width:100%;padding:14px;background:#f97316;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;">ログイン</button>
  </div>
</div>
<script>
(function(){
  const PIN_HASH = 'aa4b0d224e2b4488c6e3c5692347a0e26322d86dcb6bf01ab937e15d76037ee4';
  const AUTH_KEY = 'kouji_auth';
  const AUTH_DAYS = 30;
  async function hashPin(pin){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  window.verifyPin = async function(){
    const pin = document.getElementById('pinInput').value;
    if(pin.length!==4){document.getElementById('pinError').textContent='4桁のPINを入力してください';return;}
    const h = await hashPin(pin);
    if(h===PIN_HASH){
      localStorage.setItem(AUTH_KEY, Date.now()+AUTH_DAYS*86400000);
      document.getElementById('pinOverlay').style.display='none';
    }else{
      document.getElementById('pinError').textContent='❌ PINが違います';
      document.getElementById('pinInput').value='';
      document.getElementById('pinInput').focus();
    }
  };
  const stored = localStorage.getItem(AUTH_KEY);
  if(stored && Date.now()<parseInt(stored)){
    document.getElementById('pinOverlay').style.display='none';
  }
})();
</script>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwDhQVpdoB_Dt92NXiCXHFHREWf8O1EVU8jY_YyHtPH8wg7pB4INrcf7bTnN0QN-TAL/exec";

    const STAFF_LIST = ["高山", "伊藤", "服部"];
    const STAFF_COLORS = { "高山": "#1565c0", "伊藤": "#7b1313", "服部": "#2e7d32" };
const WORK_TYPES = ["お困りごと対応", "点検", "商談", "集金", "その他"];
    const WORK_TYPES_PDF = ["現調", "配達", "工事", "修理"];
    const PDF_TYPES = ["工事", "配達", "修理", "現調"];
    const DELIVERY_ITEMS = ["TV・BD", "冷蔵庫", "洗濯機", "調理", "家事", "理美容", "修理品", "その他"];
    const CONSTRUCTION_TYPES = ["電気", "水道", "アンテナ", "エアコン", "照明", "レンジフード", "換気扇", "ドアホン", "トイレ", "洗面台", "IH", "エコキュート", "管球", "その他"];
    const PHOTO_TYPES = ["現調", "完了"];
    const PROSPECT_LOCATIONS = ["リビング", "台所", "寝室", "洗面所", "トイレ", "玄関", "廊下", "その他"];
    const PROSPECT_PRODUCTS = ["エアコン", "冷蔵庫", "洗濯機", "TV", "照明", "換気扇", "レンジフード", "IH", "エコキュート", "温水器", "その他"];

    const state = {
      time: [], staff: "", workType: [],
      inspectionAircon: 0, inspectionOther: 0,
      deliveryItems: [], constructionTypes: [],
      repairEquipment: "", repairSymptom: "", repairContent: "",
      inspectionContent: "", hasEstimate: false,
      people: "", payment: "", creditMethod: "", creditTiming: "",
      currentPhotoType: "写真", photos: [], prospectItems: []
    };

    async function searchCust() {
      const query = document.getElementById('searchQuery').value.trim();
      if (!query) { alert('検索キーワードを入力してください'); return; }
      try {
        const res = await fetch(GAS_URL + '?action=search&query=' + encodeURIComponent(query));
        const results = await res.json();
        if (!results || results.length === 0) alert('該当する顧客が見つかりませんでした');
        else if (results.length === 1) applyCustomer(results[0]);
        else showCustList(results);
      } catch (e) { console.error(e); alert('検索に失敗しました'); }
    }

    function showCustList(results) {
      const listDiv = document.getElementById('customerList');
      listDiv.innerHTML = '';
      results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'customer-search-result';
        div.innerHTML = '<div style="font-weight:bold;">' + (r.name||'') + '</div><div style="font-size:13px;color:#666;">' + (r.tel||'') + '</div><div style="font-size:13px;color:#999;">' + (r.address||'') + '</div>';
        div.onclick = () => { applyCustomer(r); hideCustomerModal(); };
        listDiv.appendChild(div);
      });
      document.getElementById('customerModal').classList.add('active');
    }

    function hideCustomerModal() { document.getElementById('customerModal').classList.remove('active'); }
    function applyCustomer(c) {
      document.getElementById('visitName').value = c.name || '';
      document.getElementById('searchQuery').value = c.tel || '';
    }

    function createButtons(id, list, key, multi = false, extraClass = '') {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '';
      list.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'toggle-btn' + (extraClass ? ' ' + extraClass : ''); btn.textContent = item;
        btn.onclick = () => {
          if (multi) {
            if (state[key].includes(item)) { state[key] = state[key].filter(i => i !== item); btn.classList.remove('active'); }
            else { state[key].push(item); btn.classList.add('active'); }
          } else {
            el.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            state[key] = item; btn.classList.add('active');
          }
          if (key === 'workType') updateWorkDetails();
          if (key === 'people') updateWorkAmountInfo();
        };
        el.appendChild(btn);
      });
    }

    function createStaffButtons() {
      const el = document.getElementById('group-staff');
      el.innerHTML = '';
      STAFF_LIST.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'toggle-btn'; btn.textContent = item;
        btn.onclick = () => {
          el.querySelectorAll('.toggle-btn').forEach(b => {
            b.classList.remove('active');
            b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
          });
          state.staff = item; btn.classList.add('active');
          if (STAFF_COLORS[item]) {
            btn.style.background = STAFF_COLORS[item];
            btn.style.borderColor = STAFF_COLORS[item];
            btn.style.color = 'white';
          }
        };
        el.appendChild(btn);
      });
    }

    function updateWorkDetails() {
      document.getElementById('inspection-detail').classList.toggle('hidden', !state.workType.includes('点検'));
      document.getElementById('delivery-detail').classList.toggle('hidden', !state.workType.includes('配達'));
      document.getElementById('construction-detail').classList.toggle('hidden', !state.workType.includes('工事'));
      document.getElementById('repair-detail').classList.toggle('hidden', !state.workType.includes('修理'));
      document.getElementById('genncho-detail').classList.toggle('hidden', !state.workType.includes('現調'));

      const needsPeople = state.workType.some(t => PDF_TYPES.includes(t));
      const wasPdf = document.getElementById('section-people').classList.contains('hidden') === false;
      document.getElementById('section-people').classList.toggle('hidden', !needsPeople);
      if (!needsPeople) {
        state.people = '';
        document.querySelectorAll('#group-people .toggle-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('work-amount-info').classList.add('hidden');
      }
      if (needsPeople && !wasPdf) {
        const ok = confirm('📷 写真を撮りましたか？\n\n写真がないと報告書は作成されません。');
        if (!ok) {
          const info = document.getElementById('photo-no-report-msg');
          if (info) info.classList.remove('hidden');
        } else {
          const info = document.getElementById('photo-no-report-msg');
          if (info) info.classList.add('hidden');
        }
      }

      if (!state.workType.includes('点検')) {
        state.inspectionAircon = 0; state.inspectionOther = 0;
        document.getElementById('inspectionAircon').value = 0;
        document.getElementById('inspectionOther').value = 0;
      }
      if (!state.workType.includes('配達')) {
        state.deliveryItems = [];
        document.querySelectorAll('#group-deliveryItems .toggle-btn').forEach(b => b.classList.remove('active'));
      }
      if (!state.workType.includes('工事')) {
        state.constructionTypes = [];
        document.querySelectorAll('#group-constructionTypes .toggle-btn').forEach(b => b.classList.remove('active'));
      }

      updatePhotoTypeButtons();
      document.getElementById('pdf-badge').classList.toggle('hidden', !state.workType.some(t => PDF_TYPES.includes(t)));
    }

    function updatePhotoTypeButtons() {
      const group = document.getElementById('photo-type-group');
      if (group.children.length > 0) return;
      const typeClasses = { "現調": "type-genncho", "完了": "type-kanryo" };
      PHOTO_TYPES.forEach(type => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'photo-type-btn' + (typeClasses[type] ? ' ' + typeClasses[type] : '');
        btn.textContent = type; btn.dataset.photoType = type;
        btn.onclick = () => {
          document.querySelectorAll('.photo-type-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active'); state.currentPhotoType = type;
        };
        group.appendChild(btn);
      });
      state.currentPhotoType = PHOTO_TYPES[0];
      group.querySelector('.photo-type-btn').classList.add('active');
    }

    function updateWorkAmountInfo() {
      const amt = parseInt(document.getElementById('workAmount').value) || 0;
      const info = document.getElementById('work-amount-info');
      if (amt > 0 && state.people) {
        const n = state.people === '4人以上' ? 4 : parseInt(state.people);
        info.textContent = '💡 1人あたり: ' + Math.floor(amt / n) + '千円';
        info.classList.remove('hidden');
      } else info.classList.add('hidden');
    }

    createButtons('group-time', ['午前', '午後'], 'time', true);
    createStaffButtons();
createButtons('group-workType', WORK_TYPES, 'workType', true);
    createButtons('group-workType-pdf', WORK_TYPES_PDF, 'workType', true, 'pdf-work');
    createButtons('group-people', ['1人', '2人', '3人', '4人以上'], 'people');
    createButtons('group-payment', ['パナカード', '現金', '売掛', 'なし'], 'payment');
    createButtons('group-deliveryItems', DELIVERY_ITEMS, 'deliveryItems', true);
    createButtons('group-constructionTypes', CONSTRUCTION_TYPES, 'constructionTypes', true);
    updatePhotoTypeButtons();

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('inspectionAircon').oninput = e => { state.inspectionAircon = parseInt(e.target.value) || 0; };
    document.getElementById('inspectionOther').oninput = e => { state.inspectionOther = parseInt(e.target.value) || 0; };
    document.getElementById('workAmount').oninput = () => updateWorkAmountInfo();
    document.getElementById('repairEquipment').oninput = e => { state.repairEquipment = e.target.value; };
    document.getElementById('repairSymptom').oninput = e => { state.repairSymptom = e.target.value; };
    document.getElementById('repairContent').oninput = e => { state.repairContent = e.target.value; };
    document.getElementById('inspectionContent').oninput = e => { state.inspectionContent = e.target.value; };
    document.getElementById('hasEstimate').onchange = e => { state.hasEstimate = e.target.checked; };

    document.getElementById('group-payment').addEventListener('click', e => {
      if (!e.target.classList.contains('toggle-btn')) return;
      const pt = e.target.textContent;
      state.payment = pt;
      document.getElementById('payment-amount-wrapper').classList.toggle('hidden', pt !== '現金');
      document.getElementById('credit-detail-wrapper').classList.toggle('hidden', pt !== '売掛');
      if (pt !== '現金') document.getElementById('paymentAmount').value = '';
      if (pt !== '売掛') { document.getElementById('creditMethod').value = ''; document.getElementById('creditTiming').value = ''; }
    });
    document.getElementById('creditMethod').onchange = e => { state.creditMethod = e.target.value; };
    document.getElementById('creditTiming').onchange = e => { state.creditTiming = e.target.value; };

    function updatePhotoCount() {
      document.getElementById('photo-count-display').textContent = state.photos.length + '/16枚';
    }

    document.getElementById('files').onchange = e => {
      const remaining = 16 - state.photos.length;
      if (remaining <= 0) { alert('写真は16枚までです'); e.target.value = ''; return; }
      Array.from(e.target.files).slice(0, remaining).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const max = 800; let w = img.width, h = img.height;
            if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            state.photos.push({ data: canvas.toDataURL('image/jpeg', 0.7), type: state.currentPhotoType, memo: '' });
            document.getElementById('photo-no-report-msg').classList.add('hidden');
            updatePhotoPreview(); updatePhotoCount();
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
      e.target.value = '';
    };

    function updatePhotoPreview() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      state.photos.forEach((photo, i) => {
        const div = document.createElement('div'); div.className = 'photo-item';
        const img = document.createElement('img'); img.src = photo.data;
        const badge = document.createElement('span'); badge.className = 'photo-badge'; badge.textContent = photo.type;
        const editBtn = document.createElement('button'); editBtn.className = 'photo-edit-btn'; editBtn.textContent = '✏️'; editBtn.type = 'button'; editBtn.onclick = () => openAnn(i);
        const delBtn = document.createElement('button'); delBtn.className = 'photo-delete-btn'; delBtn.textContent = '✕'; delBtn.type = 'button';
        delBtn.onclick = () => { state.photos.splice(i, 1); updatePhotoPreview(); updatePhotoCount(); };
        const memo = document.createElement('input'); memo.type = 'text'; memo.className = 'photo-memo'; memo.placeholder = 'メモ'; memo.value = photo.memo || '';
        memo.oninput = ev => { photo.memo = ev.target.value; };
        div.append(img, badge, editBtn, delBtn, memo);
        preview.appendChild(div);
      });
    }

    const annState = { tool: 'pen', index: -1, drawing: false, lastX: 0, lastY: 0, history: [] };
    const annCanvas = document.getElementById('annotationCanvas');
    const annCtx = annCanvas.getContext('2d');

    function openAnn(index) {
      annState.index = index; annState.history = [];
      const img = new Image();
      img.onload = () => {
        annCanvas.width = img.width; annCanvas.height = img.height;
        annCtx.drawImage(img, 0, 0);
        annState.history.push(annCtx.getImageData(0, 0, annCanvas.width, annCanvas.height));
      };
      img.src = state.photos[index].data;
      document.getElementById('annotationModal').classList.add('active');
    }
    function setAnnTool(tool) {
      annState.tool = tool;
      ['pen','text','eraser'].forEach(t => document.getElementById('ann-'+t).classList.toggle('active', t===tool));
      document.getElementById('annTextInput').style.display = tool === 'text' ? 'block' : 'none';
    }
    function getAnnPos(e) {
      const r = annCanvas.getBoundingClientRect();
      return { x: (e.clientX-r.left)*(annCanvas.width/r.width), y: (e.clientY-r.top)*(annCanvas.height/r.height) };
    }
    function annStart(e) { if (annState.tool==='text') return; annState.drawing=true; const p=getAnnPos(e); annState.lastX=p.x; annState.lastY=p.y; }
    function annMove(e) {
      if (!annState.drawing) return;
      const p = getAnnPos(e), sz = parseInt(document.getElementById('annSize').value);
      annCtx.beginPath();
      if (annState.tool==='eraser') { annCtx.globalCompositeOperation='destination-out'; annCtx.lineWidth=sz*4; annCtx.strokeStyle='rgba(0,0,0,1)'; }
      else { annCtx.globalCompositeOperation='source-over'; annCtx.lineWidth=sz; annCtx.strokeStyle=document.getElementById('annColor').value; }
      annCtx.lineCap='round'; annCtx.lineJoin='round';
      annCtx.moveTo(annState.lastX, annState.lastY); annCtx.lineTo(p.x, p.y); annCtx.stroke();
      annState.lastX=p.x; annState.lastY=p.y;
    }
    function annEnd() {
      if (!annState.drawing) return; annState.drawing=false; annCtx.globalCompositeOperation='source-over';
      if (annState.history.length>=20) annState.history.shift();
      annState.history.push(annCtx.getImageData(0,0,annCanvas.width,annCanvas.height));
    }
    annCanvas.addEventListener('mousedown', annStart);
    annCanvas.addEventListener('mousemove', annMove);
    annCanvas.addEventListener('mouseup', annEnd);
    annCanvas.addEventListener('touchstart', e=>{e.preventDefault();annStart(e.touches[0]);},{passive:false});
    annCanvas.addEventListener('touchmove', e=>{e.preventDefault();annMove(e.touches[0]);},{passive:false});
    annCanvas.addEventListener('touchend', annEnd);
    annCanvas.addEventListener('click', e => {
      if (annState.tool!=='text') return;
      const p=getAnnPos(e), inp=document.getElementById('annTextInput');
      inp.style.display='block'; inp.dataset.x=p.x; inp.dataset.y=p.y; inp.focus();
    });
    document.getElementById('annTextInput').addEventListener('keydown', e => {
      if (e.key!=='Enter'||!e.target.value.trim()) return;
      const sz=parseInt(document.getElementById('annSize').value)*4+10;
      annCtx.globalCompositeOperation='source-over'; annCtx.font=`bold ${sz}px sans-serif`;
      annCtx.fillStyle=document.getElementById('annColor').value; annCtx.strokeStyle='#000'; annCtx.lineWidth=1;
      annCtx.strokeText(e.target.value,+e.target.dataset.x,+e.target.dataset.y);
      annCtx.fillText(e.target.value,+e.target.dataset.x,+e.target.dataset.y);
      annState.history.push(annCtx.getImageData(0,0,annCanvas.width,annCanvas.height)); e.target.value='';
    });
    function undoAnn() { if (annState.history.length<=1) return; annState.history.pop(); annCtx.putImageData(annState.history[annState.history.length-1],0,0); }
    function clearAnn() { if (!annState.history.length) return; annCtx.putImageData(annState.history[0],0,0); annState.history=[annState.history[0]]; }
    function saveAnn() { state.photos[annState.index].data=annCanvas.toDataURL('image/jpeg',0.9); updatePhotoPreview(); closeAnn(); }
    function closeAnn() { document.getElementById('annotationModal').classList.remove('active'); document.getElementById('annTextInput').style.display='none'; }

    function updateProspectItems() {
      const c = document.getElementById('prospectItems'); c.innerHTML = '';
      state.prospectItems.forEach((item, i) => {
        const d = document.createElement('div'); d.className = 'prospect-item';
        const hdr = document.createElement('div'); hdr.className = 'prospect-item-header';
        const num = document.createElement('span'); num.className = 'prospect-item-number'; num.textContent = '見込商品 '+(i+1);
        const del = document.createElement('button'); del.type='button'; del.className='prospect-delete-btn'; del.textContent='✕ 削除';
        del.onclick = () => { state.prospectItems.splice(i,1); updateProspectItems(); };
        hdr.append(num, del); d.appendChild(hdr);

        const ll = document.createElement('label'); ll.textContent='場所'; d.appendChild(ll);
        const lg = document.createElement('div'); lg.className='prospect-location-group';
        PROSPECT_LOCATIONS.forEach(loc => {
          const b=document.createElement('button'); b.type='button'; b.className='prospect-btn'; b.textContent=loc;
          if(item.location===loc) b.classList.add('active');
          b.onclick=()=>{item.location=loc;updateProspectItems();}; lg.appendChild(b);
        }); d.appendChild(lg);

        const pl = document.createElement('label'); pl.textContent='品名'; d.appendChild(pl);
        const pg = document.createElement('div'); pg.className='prospect-product-group';
        PROSPECT_PRODUCTS.forEach(prod => {
          const b=document.createElement('button'); b.type='button'; b.className='prospect-btn'; b.textContent=prod;
          if(item.product===prod) b.classList.add('active');
          b.onclick=()=>{item.product=prod;updateProspectItems();}; pg.appendChild(b);
        }); d.appendChild(pg);

        const cl = document.createElement('label'); cl.textContent='内容'; d.appendChild(cl);
        const ci = document.createElement('input'); ci.type='text'; ci.placeholder='例：省エネに変えたい、古い'; ci.value=item.content||'';
        ci.oninput=e=>{item.content=e.target.value;}; d.appendChild(ci);
        c.appendChild(d);
      });
    }

    document.getElementById('addProspectBtn').onclick = () => { state.prospectItems.push({location:'',product:'',content:''}); updateProspectItems(); };

    function printKanryo() {
      const kanryoPhotos = state.photos.filter(p => p.type === '完了');
      if (kanryoPhotos.length === 0) {
        alert('完了写真がありません。写真タイプを「完了」にして写真を追加してください。');
        return;
      }
      const date = document.getElementById('date').value;
      const visitName = document.getElementById('visitName').value || '（現場名未入力）';
      const staff = state.staff || '（担当者未選択）';
      const workType = state.workType.join('・') || '（作業内容未選択）';

      const pages = [];
      for (let i = 0; i < kanryoPhotos.length; i += 4) pages.push(kanryoPhotos.slice(i, i + 4));

      const pageHtml = pages.map((page, pageIdx) => {
        const cells = page.map(p => `
          <div class="photo-cell">
            <img src="${p.data}" alt="">
            ${p.memo ? `<div class="photo-memo">${p.memo}</div>` : ''}
          </div>`).join('');
        return `
          <div class="page">
            <div class="page-header">
              <div class="report-title">完了報告書</div>
              <div class="report-meta">${date}&emsp;${visitName}&emsp;担当：${staff}&emsp;${workType}</div>
              ${pages.length > 1 ? `<div class="page-num">${pageIdx + 1} / ${pages.length}</div>` : ''}
            </div>
            <div class="photo-grid">${cells}</div>
          </div>`;
      }).join('');

      const html = `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<style>
  @page { size: A4 landscape; margin: 10mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; }
  .page { width: 100%; height: 190mm; display: flex; flex-direction: column; page-break-after: always; }
  .page:last-child { page-break-after: auto; }
  .page-header { display: flex; align-items: baseline; gap: 10mm; border-bottom: 1px solid #333; padding-bottom: 2mm; margin-bottom: 4mm; flex-shrink: 0; }
  .report-title { font-size: 14pt; font-weight: bold; white-space: nowrap; }
  .report-meta { font-size: 9pt; color: #444; flex: 1; }
  .page-num { font-size: 9pt; color: #999; white-space: nowrap; }
  .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 5mm; flex: 1; min-height: 0; }
  .photo-cell { display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ccc; border-radius: 2mm; }
  .photo-cell img { width: 100%; flex: 1; object-fit: cover; min-height: 0; display: block; }
  .photo-memo { font-size: 7pt; color: #333; padding: 1mm 2mm; background: #f5f5f5; text-align: center; flex-shrink: 0; }
</style>
</head><body>${pageHtml}
<script>window.onload = () => { window.print(); };<\/script>
</body></html>`;

      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
    }

    document.getElementById('sendBtn').onclick = async () => {
      const btn = document.getElementById('sendBtn');
      const visitName = document.getElementById('visitName').value.trim();
      if (!state.staff) { alert('担当者を選択してください'); return; }
      if (!visitName) { alert('訪問先名を入力してください'); return; }
      if (state.workType.length === 0) { alert('作業内容を選択してください'); return; }
      const needsPeople = state.workType.some(t => PDF_TYPES.includes(t));
      if (needsPeople && !state.people) { alert('作業人数を選択してください'); return; }
      if (state.payment === '売掛' && (!state.creditMethod || !state.creditTiming)) {
        alert('売掛の場合は集金方法と入金時期を選択してください'); return;
      }


      btn.disabled = true; btn.textContent = '送信中...';

      const entry = {
        date: document.getElementById('date').value,
        staff: state.staff,
        time: state.time.join('・'),
        visitName: visitName,
workType: state.workType.join('、'),
        inspectionAircon: state.inspectionAircon,
        inspectionOther: state.inspectionOther,
        deliveryItems: state.deliveryItems.join('、'),
        constructionTypes: state.constructionTypes.join('、'),
        repairEquipment: state.repairEquipment,
        repairSymptom: state.repairSymptom,
        repairContent: state.repairContent,
        inspectionContent: state.inspectionContent,
        hasEstimate: state.hasEstimate,
        salesAmount: parseInt(document.getElementById('salesAmount').value) || 0,
        workAmount: parseInt(document.getElementById('workAmount').value) || 0,
        people: state.people,
        payment: state.payment,
        paymentAmount: parseInt(document.getElementById('paymentAmount').value) || 0,
        creditMethod: state.creditMethod,
        creditTiming: state.creditTiming,
        prospectItems: state.prospectItems,
        remarks: document.getElementById('remarks').value,
        photos: state.photos
      };

      try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
        alert('✅ 送信完了！お疲れ様です！');
        location.reload();
      } catch (err) {
        alert('❌ エラーが発生しました。もう一度お試しください。');
        console.error(err); btn.disabled = false; btn.textContent = '📤 報告書を送信する';
      }
    };
  </script>
</body>
</html>
