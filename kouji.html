<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事スタッフ日報 - ㈲ヤハタ電機商会</title>
  <style>
    /* 現場で使いやすいシンプルなデザイン */
    * { box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a3c5e; margin-top: 0; }
    label { display: block; font-weight: bold; margin: 15px 0 5px; font-size: 14px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .toggle-btn { padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; }
    .toggle-btn.active { background: #007bff; color: white; border-color: #007bff; }
    .submit-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
    .submit-btn:disabled { background: #ccc; }
    .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔧 業務日報</h2>
    <div id="form">
      <label>日にち</label>
      <input type="date" id="date">

      <label>時間帯</label>
      <div class="btn-group" id="group-time"></div>

      <label>販売担当者</label>
      <div class="btn-group" id="group-sales"></div>

      <label>責任者</label>
      <div class="btn-group" id="group-manager"></div>

      <label>訪問先名(現場名)</label>
      <input type="text" id="visitName" placeholder="例：山田太郎様">

      <label>売上金額(千円) ※半角数字</label>
      <input type="number" id="amount" placeholder="例：50">

      <label>人数</label>
      <div class="btn-group" id="group-people"></div>

      <label>備考</label>
      <textarea id="remarks" rows="3"></textarea>

      <label>写真 (最大5枚)</label>
      <input type="file" id="files" accept="image/*" multiple>
      <div class="photo-preview" id="preview"></div>

      <button id="sendBtn" class="submit-btn">報告書を送信する</button>
    </div>
  </div>

  <script>
    // ★ ここをご自身の最新GAS URLに書き換えてください ★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbytOv73ZY9kz5aVeD_nAiZBhut2OZdCAyRzRk-XcvV61DYXf-ECxVs0bIt7Eq0-cAISpg/exec";

    const state = {
      time: [], sales: "", manager: "", people: "", photos: []
    };

    // ボタン生成ヘルパー
    function createButtons(containerId, list, stateKey, isMultiple = false) {
      const container = document.getElementById(containerId);
      list.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "toggle-btn";
        btn.textContent = item;
        btn.onclick = () => {
          if (isMultiple) {
            if (state[stateKey].includes(item)) {
              state[stateKey] = state[stateKey].filter(i => i !== item);
              btn.classList.remove("active");
            } else {
              state[stateKey].push(item);
              btn.classList.add("active");
            }
          } else {
            Array.from(container.children).forEach(b => b.classList.remove("active"));
            state[stateKey] = item;
            btn.classList.add("active");
          }
        };
        container.appendChild(btn);
      });
    }

    // セットアップ
    createButtons("group-time", ["午前", "午後"], "time", true);
    createButtons("group-sales", ["伊藤", "高山"], "sales");
    createButtons("group-manager", ["渡辺", "高山"], "manager");
    createButtons("group-people", ["1人", "2人", "3人", "4人以上"], "people");

    document.getElementById("date").value = new Date().toISOString().split('T')[0];

    // 写真プレビュー処理
    document.getElementById("files").onchange = (e) => {
      const files = Array.from(e.target.files).slice(0, 5);
      state.photos = [];
      document.getElementById("preview").innerHTML = "";
      
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const max = 800;
            let w = img.width, h = img.height;
            if (w > h && w > max) { h *= max/w; w = max; }
            else if (h > max) { w *= max/h; h = max; }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            const base64 = canvas.toDataURL("image/jpeg", 0.7);
            state.photos.push(base64);
            const previewImg = document.createElement("img");
            previewImg.src = base64;
            document.getElementById("preview").appendChild(previewImg);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // 送信ボタン
    document.getElementById("sendBtn").onclick = async () => {
      const btn = document.getElementById("sendBtn");
      const visitName = document.getElementById("visitName").value;
      if (!visitName) { alert("訪問先名を入力してください"); return; }

      btn.disabled = true;
      btn.textContent = "送信中...";

      const entry = {
        date: document.getElementById("date").value,
        time: state.time, // GAS側でjoinします
        sales: state.sales,
        manager: state.manager,
        visitName: visitName,
        amount: document.getElementById("amount").value,
        people: state.people,
        remarks: document.getElementById("remarks").value,
        photos: state.photos
      };

      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(entry)
        });
        alert("送信完了！お疲れ様です！");
        location.reload();
      } catch (err) {
        alert("エラーが発生しました。");
        btn.disabled = false;
        btn.textContent = "報告書を送信する";
      }
    };
  </script>
</body>
</html>
