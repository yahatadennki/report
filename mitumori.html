<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見積書作成ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Yu Gothic', 'Hiragino Sans', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .step-indicator {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            color: #1976d2;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        .option-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .option-card.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option-title {
            font-weight: 600;
            font-size: 16px;
        }

        .product-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .product-card {
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .product-card.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .product-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 600;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-back {
            flex: 1;
            padding: 14px;
            background: #999;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-next {
            flex: 2;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* PDF用のスタイル */
        .pdf-content {
            position: absolute;
            left: -9999px;
            width: 794px;
            min-height: 1123px;
            background: white;
            padding: 50px 60px;
            font-family: 'Yu Gothic', 'MS Gothic', sans-serif;
            box-sizing: border-box;
        }

        .pdf-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .pdf-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .pdf-info {
            display: flex;
            justify-content: space-between;
            margin: 25px 0;
            font-size: 15px;
        }

        .pdf-section {
            margin: 25px 0;
        }

        .pdf-section-title {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .pdf-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .pdf-subtotal {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-top: 5px;
            border-top: 2px solid #333;
            font-weight: bold;
            background: #f5f5f5;
            font-size: 15px;
        }

        .pdf-total {
            margin-top: 30px;
            border: 3px solid #1976d2;
            background: #e3f2fd;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pdf-total-label {
            font-size: 20px;
            font-weight: bold;
            color: #1976d2;
        }

        .pdf-total-amount {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 見積書作成ツール</h1>

        <!-- ステップ0: 製品選択 -->
        <div class="step active" id="step0">
            <div class="step-indicator">製品を選択してください</div>
            
            <div class="product-selection">
                <div class="product-card" onclick="selectProduct('arawuno')">
                    <div class="product-icon">🚽</div>
                    <div class="product-name">アラウーノ</div>
                </div>
                <div class="product-card" onclick="selectProduct('led')">
                    <div class="product-icon">💡</div>
                    <div class="product-name">LED照明</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-next" style="flex: 1;" onclick="goToStep1()">次へ</button>
            </div>
        </div>

        <!-- アラウーノステップ -->
        <div class="step" id="step_arawuno">
            <div class="step-indicator">アラウーノ見積書作成</div>
            
            <div class="form-group">
                <label>顧客名</label>
                <input type="text" id="customerNameArawuno" placeholder="例：山田太郎">
            </div>

            <div class="form-group">
                <label>機種</label>
                <select id="arawunoModel">
                    <option value="アラウーノ:CH150CWSK:313800">アラウーノ (CH150CWSK) - ¥313,800</option>
                    <option value="アラウーノS:CH1601WSK:207500">アラウーノS (CH1601WSK) - ¥207,500</option>
                    <option value="アラウーノV:CH3010WS:100000">アラウーノV (CH3010WS) - ¥100,000</option>
                </select>
            </div>

            <div class="form-group">
                <label>排水芯</label>
                <select id="drainParts">
                    <option value="120～200mm:11000">120～200mm - ¥11,000</option>
                    <option value="305～510mm:22000">305～510mm - ¥22,000</option>
                </select>
            </div>

            <div class="form-group">
                <label>手洗い器</label>
                <select id="washbasin">
                    <option value="なし:0:0">なし</option>
                    <option value="XCH10EH:55000:11000">XCH10EH - ¥55,000（取付工事+¥11,000）</option>
                </select>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="work_install" checked disabled>
                    <span>本体設置工事 ¥19,800（必須）</span>
                </label>
                <label>
                    <input type="checkbox" id="work_water" checked disabled>
                    <span>給水接続工事 ¥6,600（必須）</span>
                </label>
                <label>
                    <input type="checkbox" id="work_flange">
                    <span>フランジ交換工事 ¥8,800</span>
                </label>
                <label>
                    <input type="checkbox" id="work_removal">
                    <span>既設撤去工事 ¥6,600</span>
                </label>
                <label>
                    <input type="checkbox" id="work_disposal">
                    <span>既設処分費 ¥5,500</span>
                </label>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep0()">戻る</button>
            </div>
            <button class="btn-generate" onclick="generateArawunoPDF()">📄 PDF生成</button>
        </div>

        <!-- LED照明ステップ -->
        <div class="step" id="step_led">
            <div class="step-indicator">LED照明見積書作成</div>
            
            <div class="form-group">
                <label>部屋・場所</label>
                <input type="text" id="ledRoom" placeholder="例：2階寝室">
            </div>

            <div class="form-group">
                <label>照明種類</label>
                <select id="ledType">
                    <option value="居室8畳:HH-CM0834A:21300:器具">居室8畳 HH-CM0834A - ¥21,300</option>
                    <option value="居室10畳:HH-CM1034A:27200:器具">居室10畳 HH-CM1034A - ¥27,200</option>
                    <option value="居室12畳:HH-CM1234A:32000:器具">居室12畳 HH-CM1234A - ¥32,000</option>
                    <option value="外玄関センサあり:HH-SL0010L:24700:器具">外玄関センサあり - ¥24,700</option>
                    <option value="内玄関センサあり:HH-SL0090N:28100:器具">内玄関センサあり - ¥28,100</option>
                    <option value="台所ベースライト:HH-SF0052N:26100:器具">台所ベースライト - ¥26,100</option>
                    <option value="洗面所:HH-SF0024N:14400:器具">洗面所 - ¥14,400</option>
                    <option value="浴室:HH-SF0024N:14400:器具">浴室 - ¥14,400</option>
                    <option value="電球E17 40W:-:3570:電球">電球E17 40W - ¥3,570</option>
                    <option value="電球E17 60W:-:4770:電球">電球E17 60W - ¥4,770</option>
                    <option value="電球E26 40W:-:2280:電球">電球E26 40W - ¥2,280</option>
                    <option value="電球E26 60W:-:3470:電球">電球E26 60W - ¥3,470</option>
                    <option value="ボール電球40形:-:2980:電球">ボール電球40形 - ¥2,980</option>
                    <option value="ボール電球60形:-:3360:電球">ボール電球60形 - ¥3,360</option>
                    <option value="ボール電球100形:-:4770:電球">ボール電球100形 - ¥4,770</option>
                </select>
            </div>

            <div class="form-group">
                <label>個数</label>
                <input type="number" id="ledQuantity" value="1" min="1">
            </div>

            <button class="btn-next" onclick="addLedLight()">➕ この照明を追加</button>

            <div id="ledLightsList" style="margin-top: 20px;"></div>

            <div class="form-group" id="customerNameSection" style="display:none; margin-top: 30px; border-top: 2px solid #667eea; padding-top: 20px;">
                <label>顧客名</label>
                <input type="text" id="customerNameLed" placeholder="例：山田太郎">
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="goBackToStep0()">戻る</button>
            </div>
            <button class="btn-generate" id="generateLedBtn" style="display:none;" onclick="generateLedPDF()">📄 PDF生成</button>
        </div>
    </div>

    <!-- PDF生成用の非表示エリア -->
    <div id="pdfContainer"></div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;
        let selectedProduct = '';
        let ledLights = [];

        function selectProduct(product) {
            selectedProduct = product;
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function goToStep1() {
            if (!selectedProduct) {
                alert('製品を選択してください');
                return;
            }

            document.getElementById('step0').classList.remove('active');
            if (selectedProduct === 'arawuno') {
                document.getElementById('step_arawuno').classList.add('active');
            } else {
                ledLights = [];
                document.getElementById('step_led').classList.add('active');
            }
        }

        function goBackToStep0() {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('step0').classList.add('active');
            selectedProduct = '';
            ledLights = [];
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });
        }

        function addLedLight() {
            const room = document.getElementById('ledRoom').value.trim();
            if (!room) {
                alert('部屋・場所を入力してください');
                return;
            }

            const ledInfo = document.getElementById('ledType').value.split(':');
            const ledName = ledInfo[0];
            const ledCode = ledInfo[1];
            const ledPrice = parseInt(ledInfo[2]);
            const ledCategory = ledInfo[3];
            const quantity = parseInt(document.getElementById('ledQuantity').value) || 1;
            
            const workPrice = ledCategory === '器具' ? 3300 * quantity : 0;
            const total = (ledPrice * quantity) + workPrice;

            ledLights.push({
                room: room,
                name: ledName,
                code: ledCode,
                price: ledPrice,
                quantity: quantity,
                workPrice: workPrice,
                total: total
            });

            updateLedLightsList();
            
            document.getElementById('ledRoom').value = '';
            document.getElementById('ledQuantity').value = '1';
        }

        function removeLedLight(index) {
            ledLights.splice(index, 1);
            updateLedLightsList();
        }

        function updateLedLightsList() {
            const listDiv = document.getElementById('ledLightsList');
            
            if (ledLights.length === 0) {
                listDiv.innerHTML = '';
                document.getElementById('customerNameSection').style.display = 'none';
                document.getElementById('generateLedBtn').style.display = 'none';
                return;
            }

            let html = '<div style="background: #f9f9f9; padding: 15px; border-radius: 8px;">';
            html += '<div style="font-weight: 600; margin-bottom: 15px; color: #667eea;">追加済み照明</div>';
            
            ledLights.forEach((light, index) => {
                html += `
                    <div style="background: white; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd;">
                        <div style="display: flex; justify-content: space-between;">
                            <div style="flex: 1;">
                                <div style="font-weight: 600;">${light.room}</div>
                                <div style="font-size: 14px; color: #666;">${light.name} × ${light.quantity}個</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: 600; color: #1976d2;">¥${light.total.toLocaleString()}</div>
                                <button onclick="removeLedLight(${index})" style="padding: 4px 10px; background: #ff6b6b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px;">削除</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            const grandTotal = ledLights.reduce((sum, light) => sum + light.total, 0);
            html += `<div style="padding: 12px; background: #e3f2fd; border-radius: 6px; font-weight: 600; font-size: 16px; color: #1976d2; text-align: right;">合計: ¥${grandTotal.toLocaleString()}</div>`;
            html += '</div>';

            listDiv.innerHTML = html;
            document.getElementById('customerNameSection').style.display = 'block';
            document.getElementById('generateLedBtn').style.display = 'block';
        }

        async function generateArawunoPDF() {
            const customerName = document.getElementById('customerNameArawuno').value.trim();
            if (!customerName) {
                alert('顧客名を入力してください');
                return;
            }

            const modelInfo = document.getElementById('arawunoModel').value.split(':');
            const modelName = modelInfo[0];
            const modelCode = modelInfo[1];
            const modelPrice = parseInt(modelInfo[2]);
            
            const drainInfo = document.getElementById('drainParts').value.split(':');
            const drainName = drainInfo[0];
            const drainPrice = parseInt(drainInfo[1]);
            
            const washInfo = document.getElementById('washbasin').value.split(':');
            const washName = washInfo[0];
            const washPrice = parseInt(washInfo[1]);
            const washWorkPrice = parseInt(washInfo[2]);
            
            let workList = [
                { name: '本体設置工事', price: 19800 },
                { name: '給水接続工事', price: 6600 }
            ];
            
            let workPrice = 19800 + 6600;
            if (washPrice > 0) {
                workPrice += washWorkPrice;
                workList.push({ name: '手洗い器取付工事', price: washWorkPrice });
            }
            if (document.getElementById('work_flange').checked) {
                workPrice += 8800;
                workList.push({ name: 'フランジ交換工事', price: 8800 });
            }
            if (document.getElementById('work_removal').checked) {
                workPrice += 6600;
                workList.push({ name: '既設撤去工事', price: 6600 });
            }
            if (document.getElementById('work_disposal').checked) {
                workPrice += 5500;
                workList.push({ name: '既設処分費', price: 5500 });
            }

            const productTotal = modelPrice + drainPrice + washPrice;
            const grandTotal = productTotal + workPrice;

            // PDFコンテンツHTML作成
            let productHTML = `
                <div class="pdf-item">
                    <span>本体：${modelName}（${modelCode}）</span>
                    <span>¥${modelPrice.toLocaleString()}</span>
                </div>
                <div class="pdf-item">
                    <span>排水芯部品（${drainName}）</span>
                    <span>¥${drainPrice.toLocaleString()}</span>
                </div>
            `;
            
            if (washPrice > 0) {
                productHTML += `
                    <div class="pdf-item">
                        <span>手洗い器：${washName}</span>
                        <span>¥${washPrice.toLocaleString()}</span>
                    </div>
                `;
            }

            let workHTML = '';
            workList.forEach(work => {
                workHTML += `
                    <div class="pdf-item">
                        <span>${work.name}</span>
                        <span>¥${work.price.toLocaleString()}</span>
                    </div>
                `;
            });

            const pdfHTML = `
                <div class="pdf-content" id="pdfContent">
                    <div class="pdf-header">
                        <div class="pdf-title">お見積書</div>
                    </div>
                    <div class="pdf-info">
                        <span><strong>${customerName}</strong> 様</span>
                        <span>作成日：${new Date().toLocaleDateString('ja-JP')}</span>
                    </div>
                    <div class="pdf-section">
                        <div class="pdf-section-title">商品明細</div>
                        ${productHTML}
                        <div class="pdf-subtotal">
                            <span>商品代 小計</span>
                            <span>¥${productTotal.toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="pdf-section">
                        <div class="pdf-section-title">工事費明細</div>
                        ${workHTML}
                        <div class="pdf-subtotal">
                            <span>工事費 小計</span>
                            <span>¥${workPrice.toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="pdf-total">
                        <span class="pdf-total-label">合計金額（税込）</span>
                        <span class="pdf-total-amount">¥${grandTotal.toLocaleString()}</span>
                    </div>
                </div>
            `;

            const container = document.getElementById('pdfContainer');
            container.innerHTML = pdfHTML;
            const element = document.getElementById('pdfContent');

            const canvas = await html2canvas(element, {
                scale: 2.5,
                useCORS: true,
                logging: false,
                width: 794,
                height: 1123,
                windowWidth: 794,
                windowHeight: 1123
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save('アラウーノ見積書_' + customerName + '_' + new Date().toLocaleDateString('ja-JP').replace(/\//g, '') + '.pdf');
            
            container.innerHTML = '';
        }

        async function generateLedPDF() {
            const customerName = document.getElementById('customerNameLed').value.trim();
            if (!customerName) {
                alert('顧客名を入力してください');
                return;
            }

            if (ledLights.length === 0) {
                alert('照明を追加してください');
                return;
            }

            const grandTotal = ledLights.reduce((sum, light) => sum + light.total, 0);

            let lightsHTML = '';
            ledLights.forEach((light, index) => {
                const itemPrice = light.price * light.quantity;
                lightsHTML += `
                    <div class="pdf-item" style="border-bottom: none; padding-bottom: 5px;">
                        <span><strong>${index + 1}. ${light.room}</strong></span>
                        <span></span>
                    </div>
                    <div class="pdf-item" style="padding-left: 30px; padding-top: 5px;">
                        <span>${light.name}${light.code !== '-' ? '（' + light.code + '）' : ''}</span>
                        <span></span>
                    </div>
                    <div class="pdf-item" style="padding-left: 30px; padding-top: 5px; padding-bottom: 5px;">
                        <span>個数：${light.quantity}個 × ¥${light.price.toLocaleString()}</span>
                        <span>¥${itemPrice.toLocaleString()}</span>
                    </div>
                    ${light.workPrice > 0 ? `
                    <div class="pdf-item" style="padding-left: 30px; padding-top: 5px;">
                        <span>工事費</span>
                        <span>¥${light.workPrice.toLocaleString()}</span>
                    </div>
                    ` : ''}
                    <div class="pdf-item" style="padding-left: 30px; font-weight: 600; background: #fafafa;">
                        <span>小計</span>
                        <span>¥${light.total.toLocaleString()}</span>
                    </div>
                `;
            });

            const pdfHTML = `
                <div class="pdf-content" id="pdfContent">
                    <div class="pdf-header">
                        <div class="pdf-title">お見積書</div>
                    </div>
                    <div class="pdf-info">
                        <span><strong>${customerName}</strong> 様</span>
                        <span>作成日：${new Date().toLocaleDateString('ja-JP')}</span>
                    </div>
                    <div class="pdf-section">
                        <div class="pdf-section-title">照明明細</div>
                        ${lightsHTML}
                    </div>
                    <div class="pdf-total">
                        <span class="pdf-total-label">合計金額（税込）</span>
                        <span class="pdf-total-amount">¥${grandTotal.toLocaleString()}</span>
                    </div>
                </div>
            `;

            const container = document.getElementById('pdfContainer');
            container.innerHTML = pdfHTML;
            const element = document.getElementById('pdfContent');

            const canvas = await html2canvas(element, {
                scale: 2.5,
                useCORS: true,
                logging: false,
                width: 794,
                height: 1123,
                windowWidth: 794,
                windowHeight: 1123
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save('LED照明見積書_' + customerName + '_' + new Date().toLocaleDateString('ja-JP').replace(/\//g, '') + '.pdf');
            
            container.innerHTML = '';
        }
    </script>
</body>
</html>
